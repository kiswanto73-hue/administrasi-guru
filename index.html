<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-GURU PRO V4 | DASHBOARD LENGKAP</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .page { display: none; }
        .page.active { display: block; animation: fadeIn 0.3s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        #loginPage.hidden { display: none !important; }
        .status-H { background: #dcfce7; color: #166534; }
        .status-I { background: #dbeafe; color: #1e40af; }
        .status-S { background: #fef9c3; color: #854d0e; }
        .status-A { background: #fee2e2; color: #991b1b; }
    </style>
</head>
<body class="bg-slate-50 font-sans text-slate-700">

    <div id="notifScan" class="fixed top-10 left-1/2 z-[100] -translate-x-1/2 bg-emerald-600 text-white px-10 py-4 rounded-2xl font-black shadow-2xl opacity-0 transition-all pointer-events-none">
        <span id="msgNotif">Berhasil!</span>
    </div>

    <section id="loginPage" class="fixed inset-0 z-[90] bg-indigo-950 flex items-center justify-center p-6">
        <div class="bg-white p-10 rounded-[3rem] shadow-2xl w-full max-w-md text-center border-b-8 border-yellow-400">
            <h2 class="text-2xl font-black uppercase italic text-indigo-950 mb-6">Login Guru</h2>
            <input type="text" id="idGuruLogin" placeholder="ID GURU" class="w-full p-5 bg-slate-100 rounded-2xl mb-4 text-center font-black outline-none border-2 border-transparent focus:border-indigo-500">
            <button onclick="prosesLogin()" class="w-full bg-indigo-600 text-white p-5 rounded-2xl font-black uppercase shadow-lg">Masuk</button>
        </div>
    </section>

    <aside id="sidebar" class="fixed left-0 top-0 h-screen w-64 bg-indigo-950 text-white p-6 hidden lg:block z-50">
        <h1 class="font-black text-xl italic uppercase mb-10 text-yellow-400">E-GURU</h1>
        <nav class="space-y-1 text-[11px] font-bold">
            <button onclick="showPage('dashboard')" class="w-full text-left p-4 hover:bg-white/10 rounded-2xl"><i class="fas fa-th-large mr-3"></i> Dashboard</button>
            <button onclick="showPage('presensi')" class="w-full text-left p-4 hover:bg-white/10 rounded-2xl"><i class="fas fa-qrcode mr-3"></i> Scan Presensi</button>
            <button onclick="showPage('rekap')" class="w-full text-left p-4 hover:bg-white/10 rounded-2xl"><i class="fas fa-calendar-alt mr-3"></i> Rekap Absensi</button>
            <button onclick="showPage('perangkat')" class="w-full text-left p-4 hover:bg-white/10 rounded-2xl"><i class="fas fa-file-alt mr-3"></i> Perangkat Ajar</button>
            <button onclick="showPage('jurnal')" class="w-full text-left p-4 hover:bg-white/10 rounded-2xl"><i class="fas fa-book mr-3"></i> Jurnal Guru</button>
            <button onclick="showPage('leaderboard')" class="w-full text-left p-4 hover:bg-white/10 rounded-2xl"><i class="fas fa-trophy mr-3"></i> Leaderboard</button>
            <button onclick="location.reload()" class="w-full text-left p-4 text-rose-400 mt-10"><i class="fas fa-sign-out-alt mr-3"></i> Keluar</button>
        </nav>
    </aside>

    <main id="mainApp" class="lg:ml-64 p-4 md:p-8 hidden">
        <section id="dashboard" class="page active">
            <h2 id="welcomeName" class="text-3xl font-black text-slate-800 italic uppercase">Halo!</h2>
            <p id="kelasAmpu" class="text-xs font-bold text-indigo-600 uppercase mb-8"></p>
            <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                <div onclick="showPage('presensi')" class="bg-indigo-600 p-8 rounded-[2.5rem] text-white shadow-lg cursor-pointer">
                    <i class="fas fa-fingerprint text-2xl mb-4"></i><p class="font-black uppercase text-[10px]">Scan Presensi</p>
                </div>
                <div onclick="showPage('perangkat')" class="bg-emerald-500 p-8 rounded-[2.5rem] text-white shadow-lg cursor-pointer">
                    <i class="fas fa-folder-open text-2xl mb-4"></i><p class="font-black uppercase text-[10px]">Perangkat Ajar</p>
                </div>
                <div onclick="showPage('rekap')" class="bg-blue-500 p-8 rounded-[2.5rem] text-white shadow-lg cursor-pointer">
                    <i class="fas fa-calendar-check text-2xl mb-4"></i><p class="font-black uppercase text-[10px]">Rekap Absen</p>
                </div>
            </div>
        </section>

        <section id="presensi" class="page">
            <div class="max-w-md mx-auto text-center bg-white p-8 rounded-[3rem] shadow-2xl border-t-8 border-indigo-600">
                <div id="reader" class="rounded-[2.5rem] overflow-hidden bg-slate-50 mb-6"></div>
                <div id="lastScanName" class="text-lg font-black text-indigo-600 uppercase">Siap Scan...</div>
            </div>
        </section>

        <section id="rekap" class="page">
            <div class="bg-white p-6 rounded-[2rem] shadow-sm mb-6 flex justify-between items-center">
                <h2 class="font-black uppercase italic">Rekap Absensi</h2>
                <input type="date" id="filterTgl" onchange="muatRekapHarian()" class="p-2 bg-slate-100 rounded-xl font-bold text-xs">
            </div>
            <div class="bg-white rounded-[2rem] overflow-hidden shadow-sm">
                <table class="w-full text-left text-xs">
                    <thead class="bg-slate-50 font-black text-slate-400 uppercase">
                        <tr><th class="p-5">Nama</th><th class="p-5 text-center">Status</th><th class="p-5 text-right">Aksi</th></tr>
                    </thead>
                    <tbody id="bodyRekap" class="divide-y divide-slate-50 font-bold uppercase"></tbody>
                </table>
            </div>
        </section>

        <section id="perangkat" class="page">
            <div class="bg-white p-8 rounded-[3rem] shadow-sm mb-6 border-l-[12px] border-emerald-500">
                <h2 class="font-black uppercase italic text-xl">Perangkat Ajar</h2>
                <p class="text-[10px] font-bold text-slate-400">Link Modul / RPP / Materi</p>
            </div>
            <div class="bg-white p-6 rounded-[2rem] shadow-sm mb-6">
                <input type="text" id="judulFile" placeholder="Judul Perangkat (Misal: Modul Ajar MTK)" class="w-full p-4 bg-slate-50 rounded-xl mb-3 outline-none font-bold">
                <input type="text" id="linkFile" placeholder="Paste Link Google Drive/Web di sini" class="w-full p-4 bg-slate-50 rounded-xl mb-4 outline-none font-bold">
                <button onclick="simpanPerangkat()" class="bg-emerald-500 text-white px-8 py-3 rounded-xl font-black uppercase text-[10px]">Simpan Link</button>
            </div>
            <div id="listPerangkat" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div>
        </section>

        <section id="jurnal" class="page">
            <div class="bg-white p-8 rounded-[3rem] shadow-sm mb-6 border-l-[12px] border-rose-500">
                <h2 class="font-black uppercase italic text-xl">Jurnal Harian</h2>
            </div>
            <textarea id="isiJurnal" class="w-full p-6 bg-white rounded-[2rem] shadow-sm mb-4 outline-none font-bold" rows="3" placeholder="Kegiatan hari ini..."></textarea>
            <button onclick="simpanJurnal()" class="bg-rose-500 text-white px-10 py-4 rounded-2xl font-black uppercase text-[10px]">Simpan Jurnal</button>
            <div id="listJurnal" class="mt-6 space-y-4"></div>
        </section>

        <section id="leaderboard" class="page">
            <div id="listLeaderboard" class="space-y-3"></div>
        </section>
    </main>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCUjE8WXa8Py4vnojrXDUR3uCvnQEzP6zQ",
            databaseURL: "https://e-kantin-91f0c-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "e-kantin-91f0c",
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let infoGuru = null;
        let html5QrCode = null;
        let isProcessing = false;

        function prosesLogin() {
            const id = document.getElementById('idGuruLogin').value.trim();
            db.ref('kantin_users/' + id).once('value', s => {
                if(s.exists() && s.val().kelas === "GURU"){
                    infoGuru = s.val();
                    document.getElementById('loginPage').classList.add('hidden');
                    document.getElementById('mainApp').classList.remove('hidden');
                    document.getElementById('welcomeName').innerText = "Halo, " + infoGuru.nama;
                    document.getElementById('kelasAmpu').innerText = "Wali Kelas: " + (infoGuru.jabatan || "Data Kelas Belum Diatur");
                    showPage('dashboard');
                } else { alert("ID GURU SALAH ATAU BUKAN GURU!"); }
            });
        }

        async function showPage(id) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            if (html5QrCode && id !== 'presensi') { try { await html5QrCode.stop(); } catch(e){} }
            
            if (id === 'presensi') startScan();
            if (id === 'rekap') muatRekapHarian();
            if (id === 'perangkat') muatPerangkat();
            if (id === 'jurnal') muatJurnal();
            if (id === 'leaderboard') muatLeaderboard();
        }

        async function startScan() {
            html5QrCode = new Html5Qrcode("reader");
            html5QrCode.start({ facingMode: "environment" }, { fps: 20, qrbox: 250 }, (txt) => {
                if(isProcessing) return;
                isProcessing = true;
                db.ref('kantin_users/' + txt).once('value', s => {
                    if(s.exists()){
                        const d = s.val();
                        const tgl = ("0" + new Date().getDate()).slice(-2) + "-" + ("0" + (new Date().getMonth() + 1)).slice(-2) + "-" + new Date().getFullYear();
                        db.ref(`presensi_siswa/${tgl}/${txt}`).set({
                            nama: d.nama, kelas: d.kelas, status: "HADIR", jam: new Date().getHours() + ":" + ("0" + new Date().getMinutes()).slice(-2)
                        }).then(() => {
                            showNotif(d.nama + " HADIR!");
                            document.getElementById('lastScanName').innerText = "✅ " + d.nama;
                            setTimeout(() => isProcessing = false, 2000);
                        });
                    } else { isProcessing = false; }
                });
            });
        }

        function muatRekapHarian() {
            let tglIn = document.getElementById('filterTgl').value;
            let tgl = tglIn ? tglIn.split("-").reverse().join("-") : ("0" + new Date().getDate()).slice(-2) + "-" + ("0" + (new Date().getMonth() + 1)).slice(-2) + "-" + new Date().getFullYear();
            
            db.ref('kantin_users').once('value', s1 => {
                db.ref(`presensi_siswa/${tgl}`).on('value', s2 => {
                    const dataA = s2.val() || {};
                    const body = document.getElementById('bodyRekap');
                    body.innerHTML = "";
                    s1.forEach(sis => {
                        const d = sis.val();
                        if(d.kelas === infoGuru.jabatan) {
                            const p = dataA[d.id] || { status: "ALFA" };
                            let clr = p.status === 'HADIR' ? 'status-H' : p.status === 'IZIN' ? 'status-I' : p.status === 'SAKIT' ? 'status-S' : 'status-A';
                            body.innerHTML += `<tr>
                                <td class="p-5 font-black text-[10px]">${d.nama}</td>
                                <td class="p-5 text-center"><span class="px-3 py-1 rounded-full text-[8px] font-black ${clr}">${p.status}</span></td>
                                <td class="p-5 text-right flex justify-end gap-1">
                                    <button onclick="upStat('${tgl}','${d.id}','${d.nama}','HADIR')" class="w-7 h-7 bg-emerald-500 text-white rounded-lg text-[9px]">H</button>
                                    <button onclick="upStat('${tgl}','${d.id}','${d.nama}','SAKIT')" class="w-7 h-7 bg-yellow-500 text-white rounded-lg text-[9px]">S</button>
                                    <button onclick="upStat('${tgl}','${d.id}','${d.nama}','IZIN')" class="w-7 h-7 bg-blue-500 text-white rounded-lg text-[9px]">I</button>
                                </td>
                            </tr>`;
                        }
                    });
                });
            });
        }

        function upStat(tgl, id, nama, stat) {
            db.ref(`presensi_siswa/${tgl}/${id}`).update({ nama, status: stat, jam: "Manual" });
        }

        function simpanPerangkat() {
            const judul = document.getElementById('judulFile').value;
            const link = document.getElementById('linkFile').value;
            if(!judul || !link) return alert("Isi semua data!");
            db.ref(`perangkat_ajar/${infoGuru.jabatan}`).push({ judul, link, tgl: new Date().toLocaleDateString() })
            .then(() => { 
                alert("Berhasil!"); 
                document.getElementById('judulFile').value = "";
                document.getElementById('linkFile').value = "";
                muatPerangkat(); 
            });
        }

        function muatPerangkat() {
            db.ref(`perangkat_ajar/${infoGuru.jabatan}`).once('value', s => {
                const list = document.getElementById('listPerangkat');
                list.innerHTML = "";
                s.forEach(px => {
                    const p = px.val();
                    list.innerHTML += `<div class="bg-white p-6 rounded-3xl shadow-sm flex justify-between items-center">
                        <div><p class="font-black text-xs uppercase">${p.judul}</p><p class="text-[8px] text-slate-400">${p.tgl}</p></div>
                        <a href="${p.link}" target="_blank" class="bg-indigo-600 text-white px-4 py-2 rounded-xl text-[9px] font-black">BUKA</a>
                    </div>`;
                });
            });
        }

        function simpanJurnal() {
            const teks = document.getElementById('isiJurnal').value;
            if(!teks) return;
            const tgl = ("0" + new Date().getDate()).slice(-2) + "-" + ("0" + (new Date().getMonth() + 1)).slice(-2) + "-" + new Date().getFullYear();
            db.ref(`jurnal_guru/${infoGuru.jabatan}/${tgl}`).set({ tanggal: tgl, isi: teks }).then(() => {
                document.getElementById('isiJurnal').value = "";
                muatJurnal();
            });
        }

        function muatJurnal() {
            db.ref(`jurnal_guru/${infoGuru.jabatan}`).limitToLast(5).once('value', s => {
                const list = document.getElementById('listJurnal');
                list.innerHTML = "";
                s.forEach(jx => {
                    const j = jx.val();
                    list.innerHTML = `<div class="bg-white p-5 rounded-2xl shadow-sm"><p class="text-[8px] font-black text-slate-400 mb-1">${j.tanggal}</p><p class="text-[10px] font-bold uppercase">${j.isi}</p></div>` + list.innerHTML;
                });
            });
        }

        function showNotif(msg) {
            const n = document.getElementById('notifScan');
            document.getElementById('msgNotif').innerText = msg;
            n.style.opacity = "1";
            setTimeout(() => n.style.opacity = "0", 2000);
        }

        function muatLeaderboard() {
            const container = document.getElementById('listLeaderboard');
            db.ref('kantin_users').once('value', sSiswa => {
                db.ref('presensi_siswa').once('value', sAbsen => {
                    const allA = sAbsen.val() || {};
                    let list = [];
                    sSiswa.forEach(sis => {
                        const d = sis.val();
                        if(d.kelas === infoGuru.jabatan) {
                            let jml = 0;
                            Object.keys(allA).forEach(tgl => { if(allA[tgl][d.id]?.status === "HADIR") jml++; });
                            list.push({ nama: d.nama, skor: jml });
                        }
                    });
                    list.sort((a,b) => b.skor - a.skor);
                    container.innerHTML = list.slice(0,5).map((S,i) => `<div class="bg-white p-4 rounded-2xl flex justify-between items-center shadow-sm"><p class="font-black text-[10px] uppercase">${i+1}. ${S.nama}</p><p class="font-black text-indigo-600 text-[10px]">${S.skor} Hari</p></div>`).join('');
                });
            });
        }
    </script>
</body>
</html>
