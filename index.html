<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-GURU PRO V4 | SDN 165 TJB</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .page { display: none; }
        .page.active { display: block; animation: fadeIn 0.3s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        #loginPage.hidden { display: none !important; }
        .input-nilai-kecil { padding: 0.4rem !important; width: 60px !important; font-size: 12px !important; }
    </style>
</head>
<body class="bg-slate-100 font-sans text-slate-700">

    <section id="loginPage" class="fixed inset-0 z-[100] bg-indigo-950 flex items-center justify-center p-6">
        <div class="bg-white p-8 rounded-[3rem] shadow-2xl w-full max-w-md text-center">
            <div class="bg-yellow-400 w-16 h-16 rounded-2xl flex items-center justify-center mx-auto mb-6 text-indigo-950 shadow-lg"><i class="fas fa-lock text-2xl"></i></div>
            <h2 class="text-2xl font-black italic uppercase text-slate-800">Login Guru</h2>
            <p class="text-[10px] font-bold text-slate-400 mb-8 tracking-widest uppercase">SDN 165 TANJUNG JABUNG BARAT</p>
            <input type="text" id="idGuruLogin" placeholder="Masukkan NIP / ID Guru" class="w-full p-4 bg-slate-100 border-none rounded-2xl mb-4 text-center font-black outline-none focus:ring-2 ring-indigo-500 text-slate-700 shadow-inner">
            <button onclick="prosesLogin()" class="w-full bg-indigo-600 text-white p-4 rounded-2xl font-black uppercase shadow-lg hover:bg-indigo-700 transition-all">Masuk Ke Sistem</button>
        </div>
    </section>

    <aside id="sidebar" class="fixed left-0 top-0 h-screen w-64 bg-indigo-950 text-white p-6 hidden lg:block shadow-2xl z-50">
        <div class="flex items-center gap-3 mb-10">
            <div class="bg-yellow-400 p-2 rounded-xl text-indigo-900 shadow-lg"><i class="fas fa-user-graduate text-xl"></i></div>
            <div>
                <h1 class="font-black text-xl italic leading-none">E-GURU</h1>
                <p class="text-[9px] font-bold text-indigo-400 tracking-widest uppercase">SDN 165 TJB</p>
            </div>
        </div>
        <nav class="space-y-1">
            <button onclick="showPage('dashboard')" class="w-full flex items-center gap-3 hover:bg-white/5 p-4 rounded-2xl transition-all font-bold text-xs"><i class="fas fa-th-large w-5"></i> Dashboard</button>
            <button onclick="showPage('presensi')" class="w-full flex items-center gap-3 hover:bg-white/5 p-4 rounded-2xl transition-all font-bold text-xs"><i class="fas fa-fingerprint w-5"></i> Presensi Scan</button>
            <button onclick="showPage('rekap')" class="w-full flex items-center gap-3 hover:bg-white/5 p-4 rounded-2xl transition-all font-bold text-xs"><i class="fas fa-calendar-check w-5"></i> Rekap Absensi</button>
            <button onclick="showPage('nilai')" class="w-full flex items-center gap-3 hover:bg-white/5 p-4 rounded-2xl transition-all font-bold text-xs"><i class="fas fa-star w-5"></i> Input Nilai & TP</button>
            <button onclick="showPage('perangkat')" class="w-full flex items-center gap-3 hover:bg-white/5 p-4 rounded-2xl transition-all font-bold text-xs"><i class="fas fa-folder-open w-5"></i> Perangkat Ajar</button>
            <button onclick="showPage('agenda')" class="w-full flex items-center gap-3 hover:bg-white/5 p-4 rounded-2xl transition-all font-bold text-xs"><i class="fas fa-pen-nib w-5"></i> Jurnal Guru</button>
            <button onclick="location.reload()" class="w-full flex items-center gap-3 hover:bg-red-500/20 p-4 rounded-2xl transition-all font-bold text-xs text-red-400 mt-10"><i class="fas fa-sign-out-alt w-5"></i> Keluar</button>
        </nav>
    </aside>

    <main id="mainApp" class="lg:ml-64 p-4 md:p-8 hidden">
        
        <section id="dashboard" class="page active">
            <header class="mb-10 text-center md:text-left">
                <h2 id="welcomeName" class="text-3xl font-black text-slate-800 italic uppercase leading-none">Halo, Guru!</h2>
                <p class="text-xs font-bold text-slate-400 mt-2">Pusat Kendali Administrasi Digital</p>
            </header>
            <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                <div onclick="showPage('presensi')" class="bg-indigo-600 p-8 rounded-[2.5rem] text-white shadow-xl cursor-pointer hover:rotate-2 transition-all">
                    <i class="fas fa-qrcode text-3xl mb-4"></i><h3 class="font-black uppercase italic text-sm">Scan Presensi</h3>
                </div>
                <div onclick="showPage('nilai')" class="bg-emerald-500 p-8 rounded-[2.5rem] text-white shadow-xl cursor-pointer hover:rotate-2 transition-all">
                    <i class="fas fa-edit text-3xl mb-4"></i><h3 class="font-black uppercase italic text-sm">Input Nilai & TP</h3>
                </div>
                <div onclick="showPage('perangkat')" class="bg-orange-500 p-8 rounded-[2.5rem] text-white shadow-xl cursor-pointer hover:rotate-2 transition-all">
                    <i class="fas fa-file-pdf text-3xl mb-4"></i><h3 class="font-black uppercase italic text-sm">Perangkat Ajar</h3>
                </div>
            </div>
        </section>

        <section id="nilai" class="page">
            <div class="bg-white p-6 rounded-[2.5rem] shadow-sm mb-6 border-b-4 border-emerald-500">
                <h2 class="text-xl font-black italic uppercase text-slate-800 mb-4">Penilaian Siswa</h2>
                <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-3 mb-4">
                    <select id="klsNilai" onchange="loadSiswaNilai()" class="p-3 bg-slate-50 rounded-xl text-xs font-bold outline-none ring-1 ring-slate-100">
                        <option value="">-- PILIH KELAS --</option>
                        <option value="Kelas 1">Kelas 1</option><option value="Kelas 2">Kelas 2</option><option value="Kelas 3">Kelas 3</option>
                        <option value="Kelas 4">Kelas 4</option><option value="Kelas 5">Kelas 5</option><option value="Kelas 6">Kelas 6</option>
                    </select>
                    <select id="mapelNilai" class="p-3 bg-slate-50 rounded-xl text-xs font-bold outline-none ring-1 ring-slate-100">
                        <option value="MATEMATIKA">MATEMATIKA</option><option value="IPA">IPA</option><option value="IPS">IPS</option>
                    </select>
                    <input type="text" id="descTP" placeholder="Deskripsi Tujuan Pembelajaran (TP)" class="p-3 bg-slate-50 rounded-xl text-xs font-bold ring-1 ring-slate-100 outline-none lg:col-span-2 shadow-inner">
                </div>
                <button onclick="simpanNilaiSemua()" class="w-full bg-emerald-600 text-white p-3 rounded-xl text-[10px] font-black uppercase shadow-lg shadow-emerald-100 transition-all hover:bg-emerald-700">Simpan Semua Nilai</button>
            </div>

            <div class="bg-white rounded-[2.5rem] shadow-sm overflow-hidden mb-6">
                <table class="w-full text-left">
                    <thead class="bg-slate-50 text-[9px] font-black text-slate-400 uppercase tracking-widest">
                        <tr><th class="px-6 py-3">Nama Lengkap Siswa</th><th class="px-6 py-3 text-right">Nilai Akhir</th></tr>
                    </thead>
                    <tbody id="bodyNilai" class="divide-y divide-slate-50">
                        <tr><td colspan="2" class="p-6 text-center text-slate-300 italic text-xs uppercase">Pilih kelas untuk memunculkan nama</td></tr>
                    </tbody>
                </table>
            </div>

            <div class="bg-white p-6 rounded-[2.5rem] shadow-sm border-t-4 border-indigo-500">
                <h3 class="text-sm font-black uppercase italic mb-4">Bank Tujuan Pembelajaran (TP)</h3>
                <div class="flex gap-2">
                    <input type="text" id="inputTPBaru" placeholder="Tulis TP Baru di sini..." class="flex-1 p-3 bg-slate-50 rounded-xl
