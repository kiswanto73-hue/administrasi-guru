<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-GURU PRO V5.5 | SDN 165 TJB</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .page { display: none; }
        .page.active { display: block; animation: fadeIn 0.2s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        #loginPage.hidden { display: none !important; }
        .compact-table td { padding-top: 0.4rem !important; padding-bottom: 0.4rem !important; }
    </style>
</head>
<body class="bg-slate-50 font-sans text-slate-700">

    <section id="loginPage" class="fixed inset-0 z-[100] bg-indigo-950 flex items-center justify-center p-6 text-center">
        <div class="bg-white p-8 rounded-[3rem] shadow-2xl w-full max-w-md">
            <div class="bg-yellow-400 w-16 h-16 rounded-2xl flex items-center justify-center mx-auto mb-6 shadow-lg text-indigo-900"><i class="fas fa-lock text-2xl"></i></div>
            <h2 class="text-2xl font-black uppercase italic">Login Guru</h2>
            <p class="text-[10px] font-bold text-slate-400 mb-8 tracking-widest uppercase">SDN 165 TANJUNG JABUNG BARAT</p>
            <input type="text" id="idGuruLogin" placeholder="NIP / ID GURU" class="w-full p-4 bg-slate-100 rounded-2xl mb-4 text-center font-black outline-none focus:ring-2 ring-indigo-500">
            <button onclick="prosesLogin()" class="w-full bg-indigo-600 text-white p-4 rounded-2xl font-black uppercase shadow-lg">Masuk Ke Sistem</button>
        </div>
    </section>

    <aside id="sidebar" class="fixed left-0 top-0 h-screen w-64 bg-indigo-950 text-white p-6 hidden lg:block shadow-2xl z-50">
        <div class="flex items-center gap-3 mb-10">
            <div class="bg-yellow-400 p-2 rounded-xl text-indigo-900 shadow-lg"><i class="fas fa-user-graduate text-xl"></i></div>
            <div><h1 class="font-black text-xl italic leading-none uppercase">E-Guru</h1><p class="text-[9px] font-bold text-indigo-400 tracking-widest uppercase">SDN 165 TJB</p></div>
        </div>
        <nav class="space-y-1">
            <button onclick="showPage('dashboard')" class="w-full flex items-center gap-3 hover:bg-white/5 p-4 rounded-2xl transition-all font-bold text-xs"><i class="fas fa-th-large w-5"></i> Dashboard</button>
            <button onclick="showPage('presensi')" class="w-full flex items-center gap-3 hover:bg-white/5 p-4 rounded-2xl transition-all font-bold text-xs"><i class="fas fa-qrcode w-5"></i> Scan Presensi</button>
            <button onclick="showPage('rekap')" class="w-full flex items-center gap-3 hover:bg-white/5 p-4 rounded-2xl transition-all font-bold text-xs"><i class="fas fa-list w-5"></i> Rekap Absensi</button>
            <button onclick="showPage('nilai')" class="w-full flex items-center gap-3 hover:bg-white/5 p-4 rounded-2xl transition-all font-bold text-xs"><i class="fas fa-edit w-5"></i> Input Nilai & TP</button>
            <button onclick="showPage('perangkat')" class="w-full flex items-center gap-3 hover:bg-white/5 p-4 rounded-2xl transition-all font-bold text-xs"><i class="fas fa-folder w-5"></i> Perangkat Ajar</button>
            <button onclick="showPage('agenda')" class="w-full flex items-center gap-3 hover:bg-white/5 p-4 rounded-2xl transition-all font-bold text-xs"><i class="fas fa-pen w-5"></i> Jurnal Guru</button>
            <button onclick="location.reload()" class="w-full flex items-center gap-3 hover:bg-red-500/20 p-4 rounded-2xl transition-all font-bold text-xs text-red-400 mt-10"><i class="fas fa-sign-out-alt w-5"></i> Keluar</button>
        </nav>
    </aside>

    <main id="mainApp" class="lg:ml-64 p-4 md:p-8 hidden">
        
        <section id="dashboard" class="page active">
            <h2 id="welcomeName" class="text-3xl font-black text-slate-800 italic uppercase mb-2">Halo, Guru!</h2>
            <p id="tglSkrg" class="text-xs font-bold text-slate-400 mb-8"></p>
            <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                <div onclick="showPage('presensi')" class="bg-indigo-600 p-8 rounded-[3rem] text-white shadow-xl cursor-pointer hover:scale-105 transition-all"><i class="fas fa-fingerprint text-3xl mb-4"></i><h3 class="font-black uppercase italic text-sm">Scan Siswa</h3></div>
                <div onclick="showPage('nilai')" class="bg-emerald-500 p-8 rounded-[3rem] text-white shadow-xl cursor-pointer hover:scale-105 transition-all"><i class="fas fa-star text-3xl mb-4"></i><h3 class="font-black uppercase italic text-sm">Input Nilai & TP</h3></div>
                <div onclick="showPage('perangkat')" class="bg-orange-500 p-8 rounded-[3rem] text-white shadow-xl cursor-pointer hover:scale-105 transition-all"><i class="fas fa-file-pdf text-3xl mb-4"></i><h3 class="font-black uppercase italic text-sm">Perangkat Ajar</h3></div>
            </div>
        </section>

        <section id="nilai" class="page">
            <div class="bg-white p-6 rounded-[2.5rem] shadow-sm mb-6 border-b-4 border-emerald-500">
                <h2 class="text-xl font-black italic uppercase text-slate-800 mb-4">Input Penilaian</h2>
                <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-2 mb-4">
                    <select id="klsNilai" onchange="loadSiswaNilai()" class="p-3 bg-slate-50 rounded-xl text-xs font-bold border border-slate-100 outline-none">
                        <option value="">-- PILIH KELAS --</option>
                        <option value="Kelas 1">Kelas 1</option><option value="Kelas 2">Kelas 2</option><option value="Kelas 3">Kelas 3</option>
                        <option value="Kelas 4">Kelas 4</option><option value="Kelas 5">Kelas 5</option><option value="Kelas 6">Kelas 6</option>
                    </select>
                    <div class="flex gap-1">
                        <select id="mapelNilai" onchange="muatTP()" class="flex-1 p-3 bg-slate-50 rounded-xl text-xs font-bold border border-slate-100 outline-none">
                            <option value="">-- PILIH MAPEL --</option>
                        </select>
                        <button onclick="tambahMapel()" class="bg-slate-100 text-slate-600 px-3 rounded-xl hover:bg-slate-200 shadow-sm"><i class="fas fa-plus"></i></button>
                    </div>
                    <input type="text" id="descTP" placeholder="Isi Tujuan Pembelajaran (TP)" class="p-3 bg-slate-50 rounded-xl text-xs font-bold border border-slate-100 outline-none lg:col-span-2 shadow-inner">
                </div>
                <button onclick="simpanNilaiSemua()" class="w-full bg-emerald-600 text-white p-3 rounded-xl text-[10px] font-black uppercase shadow-lg shadow-emerald-100">Simpan Semua Nilai</button>
            </div>

            <div class="bg-white rounded-[2.5rem] shadow-sm overflow-hidden mb-6">
                <table class="w-full text-left compact-table">
                    <thead class="bg-slate-50 text-[9px] font-black text-slate-400 uppercase">
                        <tr><th class="px-6 py-2">Nama Siswa</th><th class="px-6 py-2 text-right">Nilai Akhir</th></tr>
                    </thead>
                    <tbody id="bodyNilai" class="divide-y divide-slate-50">
                        <tr><td colspan="2" class="p-10 text-center text-slate-300 italic text-xs uppercase">Pilih kelas di atas...</td></tr>
                    </tbody>
                </table>
            </div>

            <div class="bg-white p-6 rounded-[2.5rem] shadow-sm border-t-4 border-indigo-500">
                <h3 class="text-xs font-black uppercase italic mb-4 text-indigo-600">Bank TP Mapel: <span id="labelMapelTP" class="text-slate-800">--</span></h3>
                <div class="flex gap-2 mb-4">
                    <input type="text" id="inputTPBaru" placeholder="Ketik TP baru untuk mapel ini..." class="flex-1 p-3 bg-slate-50 rounded-xl text-xs font-bold border border-slate-100 outline-none shadow-inner">
                    <button onclick="simpanTP()" class="bg-indigo-600 text-white px-6 rounded-xl font-black text-[10px] uppercase shadow-md">Simpan TP</button>
                </div>
                <div id="listTP" class="grid grid-cols-1 md:grid-cols-2 gap-2"></div>
            </div>
        </section>

        <section id="rekap" class="page">
            <div class="bg-white p-6 rounded-[2rem] shadow-sm mb-4 flex justify-between items-center border-l-8 border-indigo-600">
                <h2 class="font-black uppercase italic text-xs">Rekap Kehadiran Siswa</h2>
                <div class="flex gap-2">
                    <select id="filterKelasRekap" onchange="muatRekap()" class="text-[10px] font-bold p-2 bg-slate-100 rounded-lg outline-none uppercase">
                        <option value="SEMUA">SEMUA KELAS</option>
                        <option value="Kelas 1">Kelas 1</option><option value="Kelas 2">Kelas 2</option><option value="Kelas 3">Kelas 3</option>
                        <option value="Kelas 4">Kelas 4</option><option value="Kelas 5">Kelas 5</option><option value="Kelas 6">Kelas 6</option>
                    </select>
                    <button onclick="exportExcel()" class="bg-slate-900 text-white px-4 py-2 rounded-xl text-[9px] font-black uppercase shadow-lg">Excel</button>
                </div>
            </div>
            <div class="bg-white rounded-[2rem] overflow-hidden shadow-sm">
                <table class="w-full text-left" id="tabelRekap">
                    <thead class="bg-slate-100 text-[9px] font-black text-slate-400 uppercase">
                        <tr><th class="px-6 py-4">Nama</th><th class="px-6 py-4">Kelas</th><th class="px-6 py-4 text-center">Status</th></tr>
                    </thead>
                    <tbody id="bodyRekap" class="text-[10px] font-bold divide-y divide-slate-50 uppercase italic text-slate-600"></tbody>
                </table>
            </div>
        </section>

        <section id="perangkat" class="page">
            <div class="bg-white p-8 rounded-[3rem] shadow-sm mb-8 border-b-4 border-orange-500">
                <h2 class="text-xl font-black italic uppercase mb-6 text-slate-800">Manajemen Perangkat Ajar</h2>
                <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-2 mb-4">
                    <input type="text" id="judulFile" placeholder="Nama Dokumen" class="p-3 bg-slate-50 rounded-xl text-xs font-bold border border-slate-100 outline-none">
                    <select id="katPerangkat" class="p-3 bg-slate-50 rounded-xl text-xs font-bold border border-slate-100 outline-none">
                        <option value="MODUL AJAR">MODUL AJAR</option>
                        <option value="LEMBAR KERJA">LEMBAR KERJA</option>
                        <option value="KISI-KISI">KISI-KISI SOAL</option>
                        <option value="SOAL">SOAL EVALUASI</option>
                    </select>
                    <input type="text" id="linkFile" placeholder="Link Google Drive" class="md:col-span-2 p-3 bg-slate-50 rounded-xl text-xs font-bold border border-slate-100 outline-none text-indigo-600">
                </div>
                <button onclick="simpanPerangkat()" class="w-full bg-orange-500 text-white p-3 rounded-xl text-[10px] font-black uppercase shadow-lg">Upload Dokumen</button>
            </div>
            <div id="listPerangkat" class="grid grid-cols-1 md:grid-cols-2 gap-6"></div>
        </section>

        <section id="agenda" class="page">
            <div class="bg-white p-8 rounded-[3rem] shadow-sm mb-6 border-b-4 border-purple-600">
                <h2 class="text-xl font-black italic uppercase mb-6 text-slate-800">Jurnal Guru</h2>
                <textarea id="isiJurnal" class="w-full p-4 bg-slate-50 rounded-2xl text-xs font-bold border border-slate-100 mb-4 outline-none" rows="3" placeholder="Apa materi hari ini?"></textarea>
                <button onclick="simpanJurnal()" class="w-full bg-purple-600 text-white p-4 rounded-2xl text-[10px] font-black uppercase shadow-lg">Posting Jurnal</button>
            </div>
            <div id="listJurnal" class="space-y-3"></div>
        </section>

        <section id="presensi" class="page">
            <div class="max-w-xs mx-auto bg-white p-8 rounded-[3rem] shadow-2xl text-center">
                <h2 class="font-black italic uppercase mb-6 text-sm text-slate-800">Scanner QR Siswa</h2>
                <div id="reader" class="rounded-[2rem] overflow-hidden shadow-inner bg-slate-100 aspect-square"></div>
            </div>
        </section>

    </main>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCUjE8WXa8Py4vnojrXDUR3uCvnQEzP6zQ",
            databaseURL: "https://e-kantin-91f0c-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "e-kantin-91f0c",
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        let infoGuru = null;
        let html5QrCode;

        function prosesLogin() {
            const id = document.getElementById('idGuruLogin').value.trim();
            db.ref('kantin_users/' + id).once('value').then(s => {
                if(s.exists() && s.val().kelas.includes("GURU")) {
                    infoGuru = s.val();
                    document.getElementById('loginPage').classList.add('hidden');
                    document.getElementById('mainApp').classList.remove('hidden');
                    document.getElementById('welcomeName').innerText = "Halo, " + infoGuru.nama;
                    showPage('dashboard');
                } else { alert("ID GURU TIDAK TERDAFTAR!"); }
            });
        }

        function showPage(id) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            if (id === 'presensi') startScan(); else if (html5QrCode) { try { html5QrCode.stop(); } catch(e){} }
            if (id === 'rekap') muatRekap();
            if (id === 'perangkat') muatPerangkat();
            if (id === 'agenda') muatJurnal();
        }

        // --- MAPEL TAMBAH MANUAL ---
        function tambahMapel() {
            const m = prompt("Masukkan Nama Mata Pelajaran Baru (Contoh: Matematika):");
            if(m) {
                const mapelName = m.toUpperCase();
                const sel = document.getElementById('mapelNilai');
                
                // Cek apakah sudah ada di dropdown
                let exists = false;
                for (let i = 0; i < sel.options.length; i++) {
                    if (sel.options[i].value === mapelName) { exists = true; break; }
                }

                if(!exists) {
                    const opt = document.createElement("option");
                    opt.text = mapelName; opt.value = mapelName;
                    sel.add(opt);
                }
                sel.value = mapelName;
                muatTP();
            }
        }

        function loadSiswaNilai() {
            const kls = document.getElementById('klsNilai').value;
            const body = document.getElementById('bodyNilai');
            body.innerHTML = "<tr><td colspan='2' class='p-6 text-center animate-pulse text-xs font-bold'>MEMUAT...</td></tr>";
            db.ref('kantin_users').once('value', s => {
                body.innerHTML = "";
                s.forEach(child => {
                    const d = child.val();
                    if(d.kelas === kls && d.kelas !== "GURU") {
                        body.innerHTML += `<tr class="hover:bg-slate-50 transition-all">
                            <td class="px-6 py-1 uppercase text-[10px] font-black italic text-slate-700">${d.nama}</td>
                            <td class="px-6 py-1 text-right">
                                <input type="number" data-id="${d.id}" class="input-nilai w-16 p-2 bg-slate-50 border border-slate-200 rounded-lg text-center font-black focus:ring-1 ring-emerald-400 outline-none" placeholder="0">
                            </td>
                        </tr>`;
                    }
                });
            });
        }

        function simpanNilaiSemua() {
            const mapel = document.getElementById('mapelNilai').value;
            const tp = document.getElementById('descTP').value;
            if(!mapel || !tp) return alert("Pilih/Tambah Mapel dan Isi TP!");
            let c = 0;
            document.querySelectorAll('.input-nilai').forEach(inp => {
                const id = inp.getAttribute('data-id');
                if(inp.value) {
                    db.ref(`penilaian/${id}/${mapel}`).push({ tp: tp, nilai: inp.value, tgl: new Date().toLocaleDateString('id-ID') });
                    c++;
                }
            });
            alert(c + " Nilai Berhasil Disimpan!");
        }

        // --- BANK TP RELASI MAPEL ---
        function simpanTP() {
            const mapel = document.getElementById('mapelNilai').value;
            const tp = document.getElementById('inputTPBaru').value;
            if(!mapel) return alert("Tambah Mapel dulu menggunakan tombol (+)");
            if(tp) db.ref('bank_tp').push({ mapel: mapel, isi: tp }).then(() => { document.getElementById('inputTPBaru').value = ""; muatTP(); });
        }

        function muatTP() {
            const mapelAktif = document.getElementById('mapelNilai').value;
            document.getElementById('labelMapelTP').innerText = mapelAktif || "--";
            db.ref('bank_tp').on('value', s => {
                const list = document.getElementById('listTP'); list.innerHTML = "";
                let ada = false;
                s.forEach(c => {
                    if(c.val().mapel === mapelAktif) {
                        ada = true;
                        list.innerHTML += `<div class="bg-indigo-50 p-3 rounded-xl text-[10px] font-bold text-indigo-700 border border-indigo-100 flex justify-between items-center group">
                            <span class="truncate pr-2">${c.val().isi}</span>
                            <button onclick="pilihTP('${c.val().isi}')" class="bg-white text-indigo-600 px-2 py-1 rounded-lg text-[8px] font-black uppercase shadow-sm hover:bg-indigo-600 hover:text-white transition-all">Pilih</button>
                        </div>`;
                    }
                });
                if(!ada && mapelAktif) list.innerHTML = `<p class="text-[9px] italic text-slate-300">Belum ada daftar TP untuk mapel ${mapelAktif}</p>`;
            });
        }
        function pilihTP(t) { document.getElementById('descTP').value = t; }

        // --- ARSIP PERANGKAT 4 LOKER ---
        function simpanPerangkat() {
            const j = document.getElementById('judulFile').value;
            const k = document.getElementById('katPerangkat').value;
            const l = document.getElementById('linkFile').value;
            if(j && l) db.ref('perangkat_ajar').push({ judul: j, kategori: k, link: l, tgl: new Date().toLocaleDateString('id-ID') }).then(() => { alert("Berhasil!"); document.getElementById('judulFile').value = ""; document.getElementById('linkFile').value = ""; });
        }

        function muatPerangkat() {
            db.ref('perangkat_ajar').on('value', s => {
                const list = document.getElementById('listPerangkat'); list.innerHTML = "";
                const kats = ["MODUL AJAR", "LEMBAR KERJA", "KISI-KISI", "SOAL"];
                kats.forEach(kat => {
                    let items = "";
                    s.forEach(c => {
                        if(c.val().kategori === kat) {
                            items += `<a href="${c.val().link}" target="_blank" class="flex justify-between items-center p-3 bg-white rounded-xl shadow-sm border border-slate-50 hover:border-orange-400 transition-all mb-2">
                                <span class="text-[10px] font-black uppercase italic">${c.val().judul}</span>
                                <i class="fas fa-external-link-alt text-orange-400 text-[10px]"></i>
                            </a>`;
                        }
                    });
                    list.innerHTML += `<div class="bg-slate-50 p-6 rounded-[2.5rem] border border-slate-100 shadow-inner">
                        <h4 class="text-[11px] font-black uppercase text-slate-400 mb-4 tracking-widest flex items-center gap-2"><i class="fas fa-folder-open text-orange-400"></i> ${kat}</h4>
                        ${items || '<p class="text-[8px] italic text-slate-200">Kosong</p>'}
                    </div>`;
                });
            });
        }

        // --- REKAP ABSENSI REALTIME ---
        function muatRekap() {
            const k = document.getElementById('filterKelasRekap').value;
            const t = new Date().toLocaleDateString('id-ID').replace(/\//g, '-');
            const body = document.getElementById('bodyRekap'); body.innerHTML = "<tr><td colspan='3' class='p-6 text-center animate-pulse'>...</td></tr>";
            db.ref('kantin_users').once('value', s1 => {
                db.ref(`presensi_siswa/${t}`).once('value', s2 => {
                    body.innerHTML = "";
                    s1.forEach(sx => {
                        const d = sx.val();
                        if(d.kelas !== "GURU" && (k === "SEMUA" || d.kelas === k)) {
                            const h = !!(s2.val() || {})[d.id];
                            body.innerHTML += `<tr class="hover:bg-slate-50 transition-all">
                                <td class="px-6 py-4 uppercase">${d.nama}</td>
                                <td class="px-6 py-4 text-slate-400">${d.kelas}</td>
                                <td class="px-6 py-4 text-center"><span class="px-3 py-1 rounded-full text-[8px] font-black ${h?'bg-emerald-100 text-emerald-600':'bg-rose-100 text-rose-600'}">${h?'HADIR':'ALFA'}</span></td>
                            </tr>`;
                        }
                    });
                });
            });
        }

        function simpanJurnal() {
            const i = document.getElementById('isiJurnal').value;
            if(i) db.ref('jurnal_mengajar').push({ isi: i, tgl: new Date().toLocaleDateString('id-ID'), jam: new Date().toLocaleTimeString('id-ID') }).then(() => { document.getElementById('isiJurnal').value = ""; alert("Terposting!"); });
        }

        function muatJurnal() {
            db.ref('jurnal_mengajar').on('value', s => {
                const list = document.getElementById('listJurnal'); list.innerHTML = "";
                let arr = []; s.forEach(c => arr.push(c.val()));
                arr.reverse().forEach(j => {
                    list.innerHTML += `<div class="bg-white p-5 rounded-[2rem] border-l-4 border-purple-500 shadow-sm"><p class="text-[8px] text-slate-400 font-bold uppercase mb-2">${j.tgl} | ${j.jam}</p><p class="text-[11px] font-medium text-slate-600 leading-relaxed italic">"${j.isi}"</p></div>`;
                });
            });
        }

        function startScan() {
            html5QrCode = new Html5Qrcode("reader");
            html5QrCode.start({ facingMode: "environment" }, { fps: 10, qrbox: 200 }, (txt) => {
                db.ref('kantin_users/' + txt).once('value', s => {
                    if(s.exists()){
                        const d = s.val();
                        const t = new Date().toLocaleDateString('id-ID').replace(/\//g, '-');
                        db.ref(`presensi_siswa/${t}/${txt}`).set({ nama: d.nama, kelas: d.kelas, jam: new Date().toLocaleTimeString('id-ID') });
                        alert("Hadir: " + d.nama);
                    }
                });
            });
        }

        document.getElementById('tglSkrg').innerText = new Date().toLocaleDateString('id-ID', {weekday:'long', day:'numeric', month:'long', year:'numeric'});
        function exportExcel() { XLSX.writeFile(XLSX.utils.table_to_book(document.getElementById("tabelRekap")), `Rekap_Presensi_${new Date().toLocaleDateString()}.xlsx`); }
    </script>
</body>
</html>
