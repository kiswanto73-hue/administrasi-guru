<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-GURU | SDN 165 TJB</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .page { display: none; }
        .page.active { display: block; animation: fadeIn 0.3s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .nav-btn.active { background: rgba(255,255,255,0.1); border-left: 4px solid #facc15; }
    </style>
</head>
<body class="bg-slate-50 font-sans text-slate-700">

    <aside class="fixed left-0 top-0 h-screen w-64 bg-indigo-950 text-white p-6 hidden lg:block shadow-2xl z-50">
        <div class="flex items-center gap-3 mb-10">
            <div class="bg-yellow-400 p-2 rounded-2xl text-indigo-900 shadow-lg"><i class="fas fa-user-graduate text-xl"></i></div>
            <div>
                <h1 class="font-black text-xl italic leading-none">E-GURU</h1>
                <p class="text-[9px] font-bold text-indigo-400 tracking-widest uppercase">SDN 165 TJB</p>
            </div>
        </div>
        <nav class="space-y-1">
            <button onclick="showPage('dashboard')" class="nav-btn w-full flex items-center gap-3 hover:bg-white/5 p-4 rounded-2xl transition-all font-bold text-xs"><i class="fas fa-th-large w-5"></i> Dashboard</button>
            <div class="pt-4 pb-2 px-4 text-[10px] font-black text-indigo-500 uppercase tracking-widest">Akademik</div>
            <button onclick="showPage('presensi')" class="nav-btn w-full flex items-center gap-3 hover:bg-white/5 p-4 rounded-2xl transition-all font-bold text-xs"><i class="fas fa-fingerprint w-5"></i> Presensi Scan</button>
            <button onclick="showPage('rekap')" class="nav-btn w-full flex items-center gap-3 hover:bg-white/5 p-4 rounded-2xl transition-all font-bold text-xs"><i class="fas fa-calendar-check w-5"></i> Rekap Absensi</button>
            <button onclick="showPage('nilai')" class="nav-btn w-full flex items-center gap-3 hover:bg-white/5 p-4 rounded-2xl transition-all font-bold text-xs"><i class="fas fa-star w-5"></i> Input Nilai</button>
            <div class="pt-4 pb-2 px-4 text-[10px] font-black text-indigo-500 uppercase tracking-widest">Administrasi</div>
            <button onclick="showPage('perangkat')" class="nav-btn w-full flex items-center gap-3 hover:bg-white/5 p-4 rounded-2xl transition-all font-bold text-xs"><i class="fas fa-folder-open w-5"></i> Perangkat Ajar</button>
            <button onclick="showPage('agenda')" class="nav-btn w-full flex items-center gap-3 hover:bg-white/5 p-4 rounded-2xl transition-all font-bold text-xs"><i class="fas fa-pen-nib w-5"></i> Jurnal Guru</button>
        </nav>
    </aside>

    <main class="lg:ml-64 p-4 md:p-8 pb-24">
        
        <section id="dashboard" class="page active">
            <div class="flex justify-between items-center mb-10">
                <div><h2 class="text-3xl font-black text-slate-800 italic uppercase">Panel Utama</h2><p class="text-sm font-bold text-slate-400">Pusat Administrasi Digital SDN 165 TJB</p></div>
                <div class="hidden md:block bg-white p-4 rounded-3xl shadow-sm border border-slate-100 text-right">
                    <p id="tglSkrg" class="text-xs font-black text-indigo-600 uppercase"></p>
                </div>
            </div>
            <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                <div onclick="showPage('presensi')" class="bg-indigo-600 p-8 rounded-[3rem] text-white shadow-xl cursor-pointer hover:scale-105 transition-all">
                    <i class="fas fa-qrcode text-4xl mb-4"></i><h3 class="font-black uppercase italic">Scan Presensi</h3>
                </div>
                <div onclick="showPage('nilai')" class="bg-emerald-500 p-8 rounded-[3rem] text-white shadow-xl cursor-pointer hover:scale-105 transition-all">
                    <i class="fas fa-edit text-4xl mb-4"></i><h3 class="font-black uppercase italic">Input Nilai</h3>
                </div>
                <div onclick="showPage('perangkat')" class="bg-orange-500 p-8 rounded-[3rem] text-white shadow-xl cursor-pointer hover:scale-105 transition-all">
                    <i class="fas fa-cloud absolute opacity-10 text-9xl -right-4 -bottom-4"></i><h3 class="font-black uppercase italic">Perangkat Ajar</h3>
                </div>
            </div>
        </section>

        <section id="presensi" class="page">
            <div class="max-w-xl mx-auto text-center">
                <div class="bg-white p-8 rounded-[3rem] shadow-xl border border-slate-100 relative overflow-hidden">
                    <div class="bg-indigo-600 h-2 absolute top-0 left-0 right-0"></div>
                    <h2 class="text-xl font-black uppercase italic mb-6 text-slate-800 italic">Scanner Kehadiran</h2>
                    <div id="reader" class="rounded-[2.5rem] overflow-hidden bg-slate-900 aspect-square shadow-2xl"></div>
                    <div id="notifPresensi" class="mt-6 p-4 rounded-2xl bg-emerald-50 border border-emerald-100 hidden">
                        <p class="text-[10px] font-black text-emerald-600 uppercase">Siswa Berhasil Dicatat</p>
                        <h4 id="namaSiswaScan" class="text-lg font-black text-slate-800 uppercase italic">---</h4>
                    </div>
                </div>
            </div>
        </section>

        <section id="rekap" class="page">
            <div class="bg-white p-8 rounded-[3rem] shadow-sm mb-6 flex flex-wrap justify-between items-center gap-4 border-l-8 border-indigo-600">
                <h2 class="text-xl font-black italic uppercase">Laporan Kehadiran</h2>
                <div class="flex gap-2">
                    <input type="date" id="tglRekap" onchange="muatRekap()" class="bg-slate-100 p-3 rounded-2xl text-xs font-bold outline-none ring-1 ring-slate-200">
                    <button onclick="exportExcel()" class="bg-slate-900 text-white px-5 py-3 rounded-2xl text-[10px] font-black uppercase hover:bg-indigo-600 transition-all">Export Excel</button>
                </div>
            </div>
            <div class="bg-white rounded-[3rem] shadow-sm border border-slate-100 overflow-hidden">
                <table class="w-full text-left border-collapse" id="tabelRekap">
                    <thead class="bg-slate-50 text-[10px] font-black text-slate-400 uppercase tracking-widest">
                        <tr><th class="p-6">Nama Siswa</th><th class="p-6">Kelas</th><th class="p-6">Jam</th><th class="p-6 text-center">Status</th></tr>
                    </thead>
                    <tbody id="bodyRekap" class="text-xs font-bold divide-y divide-slate-50 uppercase italic"></tbody>
                </table>
            </div>
        </section>

        <section id="nilai" class="page">
            <div class="bg-white p-8 rounded-[3rem] shadow-sm mb-6 border-b-4 border-emerald-500">
                <h2 class="text-xl font-black italic uppercase mb-6">Input Nilai Siswa</h2>
                <div class="grid grid-cols-1 md:grid-cols-4 gap-4">
                    <select id="klsNilai" onchange="loadSiswaNilai()" class="p-4 bg-slate-50 rounded-2xl text-xs font-bold outline-none ring-1 ring-slate-200">
                        <option value="">-- Pilih Kelas --</option>
                        <option value="Kelas 1">Kelas 1</option><option value="Kelas 2">Kelas 2</option><option value="Kelas 3">Kelas 3</option>
                        <option value="Kelas 4">Kelas 4</option><option value="Kelas 5">Kelas 5</option><option value="Kelas 6">Kelas 6</option>
                    </select>
                    <select id="mapelNilai" class="p-4 bg-slate-50 rounded-2xl text-xs font-bold outline-none ring-1 ring-slate-200">
                        <option value="MATEMATIKA">MATEMATIKA</option><option value="IPA">IPA</option><option value="IPS">IPS</option><option value="PAI">PAI</option>
                    </select>
                    <select id="katNilai" class="p-4 bg-slate-50 rounded-2xl text-xs font-bold outline-none ring-1 ring-slate-200">
                        <option value="TUGAS_1">TUGAS 1</option><option value="PTS">PTS</option><option value="PAS">PAS</option>
                    </select>
                    <button onclick="simpanNilaiSemua()" class="bg-emerald-600 text-white p-4 rounded-2xl text-xs font-black uppercase shadow-lg shadow-emerald-100">Simpan Semua</button>
                </div>
            </div>
            <div class="bg-white rounded-[3rem] shadow-sm border border-slate-100 overflow-hidden">
                <table class="w-full text-left"><tbody id="bodyNilai" class="divide-y divide-slate-100"></tbody></table>
            </div>
        </section>

        <section id="perangkat" class="page">
            <div class="bg-white p-8 rounded-[3rem] shadow-sm mb-8 border-b-4 border-orange-500">
                <h2 class="text-xl font-black italic uppercase mb-6 text-slate-800">Perangkat Ajar (Drive)</h2>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <input type="text" id="judulFile" placeholder="Judul Dokumen" class="p-4 bg-slate-50 rounded-2xl text-xs font-bold outline-none ring-1 ring-slate-200">
                    <input type="text" id="linkFile" placeholder="Link Google Drive" class="p-4 bg-slate-50 rounded-2xl text-xs font-bold outline-none ring-1 ring-slate-200 text-indigo-600">
                    <button onclick="simpanPerangkat()" class="md:col-span-2 bg-orange-500 text-white p-4 rounded-2xl text-xs font-black uppercase">Simpan Link</button>
                </div>
            </div>
            <div id="listPerangkat" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div>
        </section>

        <section id="agenda" class="page">
            <div class="bg-white p-8 rounded-[3rem] shadow-sm mb-8 border-b-4 border-purple-600">
                <h2 class="text-xl font-black italic uppercase mb-6 text-slate-800 italic">Jurnal Mengajar</h2>
                <textarea id="isiJurnal" placeholder="Apa materi hari ini?" class="w-full p-4 bg-slate-50 rounded-2xl text-xs font-bold outline-none ring-1 ring-slate-200 mb-4" rows="3"></textarea>
                <button onclick="simpanJurnal()" class="w-full bg-purple-600 text-white p-4 rounded-2xl text-xs font-black uppercase">Posting Jurnal</button>
            </div>
            <div id="listJurnal" class="space-y-4"></div>
        </section>

    </main>

    <script>
        // CONFIG FIREBASE (Gunakan punya Bapak)
        const firebaseConfig = {
            apiKey: "AIzaSyCUjE8WXa8Py4vnojrXDUR3uCvnQEzP6zQ",
            databaseURL: "https://e-kantin-91f0c-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "e-kantin-91f0c",
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // LOGIKA NAVIGASI
        function showPage(id) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            
            if (id === 'presensi') { startScan(); } 
            else if (window.html5QrCode && html5QrCode.isScanning) { html5QrCode.stop(); }
            
            if (id === 'rekap') { muatRekap(); }
            if (id === 'perangkat') { muatPerangkat(); }
            if (id === 'agenda') { muatJurnal(); }
        }

        // --- MODUL PRESENSI ---
        let html5QrCode;
        function startScan() {
            html5QrCode = new Html5Qrcode("reader");
            html5QrCode.start({ facingMode: "environment" }, { fps: 10, qrbox: 250 }, (txt) => {
                db.ref('kantin_users/' + txt).once('value', s => {
                    if(s.exists()){
                        const d = s.val();
                        const tgl = new Date().toLocaleDateString('id-ID').replace(/\//g, '-');
                        db.ref(`presensi_siswa/${tgl}/${txt}`).set({
                            nama: d.nama, kelas: d.kelas, jam: new Date().toLocaleTimeString('id-ID')
                        });
                        document.getElementById('namaSiswaScan').innerText = d.nama;
                        document.getElementById('notifPresensi').classList.remove('hidden');
                        setTimeout(() => document.getElementById('notifPresensi').classList.add('hidden'), 3000);
                    }
                });
            });
        }

        // --- MODUL REKAP ---
        function muatRekap() {
            const tglVal = document.getElementById('tglRekap').value || new Date().toISOString().split('T')[0];
            const tglFixed = new Date(tglVal).toLocaleDateString('id-ID').replace(/\//g, '-');
            db.ref('kantin_users').once('value', sSiswa => {
                db.ref(`presensi_siswa/${tglFixed}`).once('value', sAbsen => {
                    const absen = sAbsen.val() || {};
                    const body = document.getElementById('bodyRekap');
                    body.innerHTML = "";
                    sSiswa.forEach(s => {
                        const d = s.val();
                        const hadir = !!absen[d.id];
                        body.innerHTML += `<tr class="hover:bg-slate-50"><td class="p-6">${d.nama}</td><td class="p-6">${d.kelas}</td><td class="p-6">${hadir ? absen[d.id].jam : '-'}</td><td class="p-6 text-center"><span class="px-3 py-1 rounded-full text-[9px] ${hadir ? 'bg-emerald-100 text-emerald-600' : 'bg-rose-100 text-rose-600'}">${hadir ? 'HADIR' : 'ALFA'}</span></td></tr>`;
                    });
                });
            });
        }

        // --- MODUL NILAI ---
        function loadSiswaNilai() {
            const kls = document.getElementById('klsNilai').value;
            const body = document.getElementById('bodyNilai');
            body.innerHTML = "";
            db.ref('kantin_users').once('value', s => {
                s.forEach(child => {
                    const d = child.val();
                    if(d.kelas === kls) {
                        body.innerHTML += `<tr class="p-6"><td class="p-6 font-black uppercase text-sm italic">${d.nama}</td><td class="p-6 text-right"><input type="number" data-id="${d.id}" class="input-nilai w-20 p-3 bg-white border-2 rounded-xl text-center font-black" placeholder="0"></td></tr>`;
                    }
                });
            });
        }

        function simpanNilaiSemua() {
            const mapel = document.getElementById('mapelNilai').value;
            const kat = document.getElementById('katNilai').value;
            document.querySelectorAll('.input-nilai').forEach(inp => {
                const id = inp.getAttribute('data-id');
                const nilai = inp.value;
                if(nilai) db.ref(`penilaian/${id}/${mapel}/${kat}`).set(nilai);
            });
            alert("Nilai Berhasil Disimpan!");
        }

        // --- MODUL PERANGKAT ---
        function simpanPerangkat() {
            const judul = document.getElementById('judulFile').value;
            const link = document.getElementById('linkFile').value;
            if(judul && link) db.ref('perangkat_ajar').push({ judul, link, tgl: new Date().toLocaleDateString('id-ID') }).then(() => alert("Berhasil!"));
        }
        function muatPerangkat() {
            db.ref('perangkat_ajar').on('value', s => {
                const list = document.getElementById('listPerangkat'); list.innerHTML = "";
                s.forEach(child => {
                    const f = child.val();
                    list.innerHTML += `<div class="bg-white p-6 rounded-[2.5rem] border border-slate-100 shadow-sm"><h4 class="font-black text-sm uppercase">${f.judul}</h4><p class="text-[10px] text-slate-400 mb-4">${f.tgl}</p><a href="${f.link}" target="_blank" class="text-indigo-600 font-black text-[10px] uppercase">Buka Drive ➜</a></div>`;
                });
            });
        }

        // --- MODUL JURNAL ---
        function simpanJurnal() {
            const isi = document.getElementById('isiJurnal').value;
            if(isi) db.ref('jurnal_mengajar').push({ isi, tgl: new Date().toLocaleDateString('id-ID'), jam: new Date().toLocaleTimeString('id-ID') }).then(() => { alert("Jurnal Diposting!"); document.getElementById('isiJurnal').value = ""; });
        }
        function muatJurnal() {
            db.ref('jurnal_mengajar').on('value', s => {
                const list = document.getElementById('listJurnal'); list.innerHTML = "";
                let data = []; s.forEach(c => data.push(c.val()));
                data.reverse().forEach(j => {
                    list.innerHTML += `<div class="bg-white p-6 rounded-[2.5rem] border-l-8 border-purple-500 shadow-sm"><p class="text-[10px] font-bold text-slate-400 mb-2">${j.tgl} | ${j.jam}</p><p class="text-sm font-medium italic">"${j.isi}"</p></div>`;
                });
            });
        }

        document.getElementById('tglSkrg').innerText = new Date().toLocaleDateString('id-ID', {weekday:'long', day:'numeric', month:'long', year:'numeric'});
        function exportExcel() { XLSX.writeFile(XLSX.utils.table_to_book(document.getElementById("tabelRekap")), `Rekap_Presensi.xlsx`); }
    </script>
</body>
</html>
