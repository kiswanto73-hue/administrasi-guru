<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-GURU PRO V4 | DASHBOARD LENGKAP</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .page { display: none; }
        .page.active { display: block; animation: fadeIn 0.3s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        #loginPage.hidden { display: none !important; }
        .rekap-scroll { overflow-x: auto; max-width: 100%; }
        .cell-status { min-width: 35px; text-align: center; font-size: 10px; border: 1px solid #f1f5f9; padding: 4px; }
        .status-H { background: #dcfce7; color: #166534; font-weight: 900; }
        .status-I { background: #dbeafe; color: #1e40af; }
        .status-S { background: #fef9c3; color: #854d0e; }
        .status-A { background: #fee2e2; color: #991b1b; }
    </style>
</head>
<body class="bg-slate-50 font-sans text-slate-700">

    <div id="notifScan" class="fixed top-10 left-1/2 z-[100] -translate-x-1/2 bg-emerald-600 text-white px-10 py-4 rounded-2xl font-black shadow-2xl uppercase opacity-0 pointer-events-none transition-all">
        <i class="fas fa-check-circle mr-2"></i> <span id="msgNotif">Berhasil!</span>
    </div>

    <section id="loginPage" class="fixed inset-0 z-[90] bg-indigo-950 flex items-center justify-center p-6">
        <div class="bg-white p-10 rounded-[3rem] shadow-2xl w-full max-w-md text-center border-b-8 border-yellow-400">
            <div class="bg-indigo-600 w-20 h-20 rounded-3xl flex items-center justify-center mx-auto mb-6 text-white shadow-xl rotate-3"><i class="fas fa-chalkboard-teacher text-3xl"></i></div>
            <h2 class="text-2xl font-black uppercase italic text-indigo-950">Login Guru</h2>
            <input type="text" id="idGuruLogin" placeholder="ID GURU" class="w-full p-5 bg-slate-100 rounded-2xl mb-4 text-center font-black outline-none border-2 border-transparent focus:border-indigo-500 shadow-inner">
            <button onclick="prosesLogin()" class="w-full bg-indigo-600 text-white p-5 rounded-2xl font-black uppercase shadow-lg">Masuk</button>
        </div>
    </section>

    <aside id="sidebar" class="fixed left-0 top-0 h-screen w-64 bg-indigo-950 text-white p-6 hidden lg:block z-50">
        <div class="flex items-center gap-3 mb-10 p-2 text-yellow-400">
            <i class="fas fa-university text-2xl"></i>
            <h1 class="font-black text-xl italic uppercase leading-none text-white">E-Guru</h1>
        </div>
        <nav class="space-y-1">
            <button onclick="showPage('dashboard')" class="w-full flex items-center gap-4 hover:bg-white/10 p-4 rounded-2xl font-bold text-[10px] transition-all"><i class="fas fa-th-large w-5 text-indigo-400"></i> Dashboard</button>
            <button onclick="showPage('presensi')" class="w-full flex items-center gap-4 hover:bg-white/10 p-4 rounded-2xl font-bold text-[10px] transition-all"><i class="fas fa-qrcode w-5 text-emerald-400"></i> Scan Presensi</button>
            <button onclick="showPage('rekap')" class="w-full flex items-center gap-4 hover:bg-white/10 p-4 rounded-2xl font-bold text-[10px] transition-all"><i class="fas fa-calendar-alt w-5 text-blue-400"></i> Rekap Absensi</button>
            <button onclick="showPage('jurnal')" class="w-full flex items-center gap-4 hover:bg-white/10 p-4 rounded-2xl font-bold text-[10px] transition-all"><i class="fas fa-book w-5 text-rose-400"></i> Jurnal Guru</button>
            <button onclick="showPage('leaderboard')" class="w-full flex items-center gap-4 hover:bg-white/10 p-4 rounded-2xl font-bold text-[10px] transition-all"><i class="fas fa-trophy w-5 text-yellow-400"></i> Leaderboard</button>
            <button onclick="location.reload()" class="w-full flex items-center gap-4 text-rose-400 p-4 font-bold text-[10px] mt-6 hover:bg-rose-500/10 rounded-2xl transition-all"><i class="fas fa-sign-out-alt w-5"></i> Keluar</button>
        </nav>
    </aside>

    <main id="mainApp" class="lg:ml-64 p-4 md:p-8 hidden">
        <section id="dashboard" class="page active">
            <h2 id="welcomeName" class="text-3xl font-black text-slate-800 italic uppercase mb-2">Halo, Guru!</h2>
            <p id="kelasAmpu" class="text-xs font-bold text-indigo-600 uppercase mb-8"></p>
            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4">
                <div onclick="showPage('presensi')" class="bg-indigo-600 p-6 rounded-[2.5rem] text-white shadow-lg cursor-pointer hover:scale-95 transition-all">
                    <i class="fas fa-fingerprint text-2xl mb-4"></i>
                    <p class="font-black uppercase italic text-[10px]">Scan Presensi</p>
                </div>
                <div onclick="showPage('rekap')" class="bg-blue-500 p-6 rounded-[2.5rem] text-white shadow-lg cursor-pointer hover:scale-95 transition-all">
                    <i class="fas fa-calendar-check text-2xl mb-4"></i>
                    <p class="font-black uppercase italic text-[10px]">Rekap Absen</p>
                </div>
                <div onclick="showPage('leaderboard')" class="bg-yellow-500 p-6 rounded-[2.5rem] text-white shadow-lg cursor-pointer hover:scale-95 transition-all">
                    <i class="fas fa-award text-2xl mb-4"></i>
                    <p class="font-black uppercase italic text-[10px]">Top Siswa</p>
                </div>
            </div>
        </section>

        <section id="presensi" class="page">
            <div class="max-w-md mx-auto text-center bg-white p-8 rounded-[3rem] shadow-2xl border-t-8 border-indigo-600">
                <h2 class="font-black italic uppercase mb-6">Scanner Presensi</h2>
                <div id="reader" class="rounded-[2.5rem] overflow-hidden bg-slate-50 aspect-square mb-6"></div>
                <div id="lastScanName" class="text-lg font-black text-indigo-600 uppercase">Siap Scan...</div>
            </div>
        </section>

        <section id="rekap" class="page">
            <div class="bg-white p-8 rounded-[3rem] shadow-sm mb-6 border-l-[12px] border-blue-500 flex justify-between items-center">
                <div>
                    <h2 class="font-black uppercase italic text-xl">Laporan Absensi</h2>
                    <p id="labelKelas" class="text-[10px] font-bold text-slate-400 uppercase italic"></p>
                </div>
                <input type="date" id="filterTgl" onchange="muatRekapHarian()" class="p-3 bg-slate-100 rounded-xl text-xs font-black outline-none">
            </div>
            <div id="viewHarian" class="bg-white rounded-[3rem] overflow-hidden shadow-sm p-4">
                <table class="w-full text-left" id="tabelRekap">
                    <thead class="bg-slate-50 text-[9px] font-black text-slate-400 uppercase">
                        <tr><th class="px-8 py-5">Nama Siswa</th><th class="px-8 py-5 text-center">Status</th><th class="px-8 py-5 text-right">Aksi</th></tr>
                    </thead>
                    <tbody id="bodyRekap" class="divide-y divide-slate-50 font-bold uppercase text-slate-600 text-xs"></tbody>
                </table>
            </div>
        </section>

        <section id="jurnal" class="page">
            <div class="bg-white p-8 rounded-[3rem] shadow-sm mb-6 border-l-[12px] border-rose-500">
                <h2 class="font-black uppercase italic text-xl">Jurnal Harian</h2>
                <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Catatan KBM</p>
            </div>
            <div class="bg-white p-8 rounded-[3rem] shadow-sm mb-6">
                <textarea id="isiJurnal" class="w-full p-6 bg-slate-50 rounded-3xl outline-none border-2 border-transparent focus:border-rose-400 font-bold text-sm mb-4" rows="3" placeholder="Tulis kegiatan hari ini..."></textarea>
                <button onclick="simpanJurnal()" class="bg-rose-500 text-white px-8 py-4 rounded-2xl font-black uppercase text-[10px] shadow-lg">Simpan</button>
            </div>
            <div id="listJurnal" class="space-y-4"></div>
        </section>

        <section id="leaderboard" class="page">
            <div class="bg-white p-8 rounded-[3rem] shadow-sm mb-6 border-l-[12px] border-yellow-400">
                <h2 class="font-black uppercase italic text-xl">🏆 Peringkat Rajin</h2>
            </div>
            <div class="grid grid-cols-1 gap-3" id="listLeaderboard"></div>
        </section>
    </main>

    <script>
        // --- KONFIGURASI FIREBASE ---
        const firebaseConfig = {
            apiKey: "AIzaSyCUjE8WXa8Py4vnojrXDUR3uCvnQEzP6zQ",
            databaseURL: "https://e-kantin-91f0c-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "e-kantin-91f0c",
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let infoGuru = null;
        let html5QrCode = null;
        let isProcessing = false;

        // --- LOGIN ---
        function prosesLogin() {
            const id = document.getElementById('idGuruLogin').value.trim();
            db.ref('kantin_users/' + id).once('value', s => {
                if(s.exists() && s.val().kelas === "GURU"){
                    infoGuru = s.val();
                    document.getElementById('loginPage').classList.add('hidden');
                    document.getElementById('mainApp').classList.remove('hidden');
                    document.getElementById('welcomeName').innerText = "Halo, " + infoGuru.nama;
                    document.getElementById('kelasAmpu').innerText = "Wali Kelas: " + infoGuru.jabatan;
                    document.getElementById('labelKelas').innerText = "Kelas: " + infoGuru.jabatan;
                    showPage('dashboard');
                } else { alert("ID GURU TIDAK TERDAFTAR!"); }
            });
        }

        // --- NAVIGASI HALAMAN ---
        async function showPage(id) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(id).classList.add('active');

            // Logika Stop Scanner jika pindah halaman
            if (id !== 'presensi') {
                if (html5QrCode && html5QrCode.getState() === 2) {
                    await html5QrCode.stop();
                }
            }

            if (id === 'presensi') startScan();
            if (id === 'rekap') muatRekapHarian();
            if (id === 'leaderboard') muatLeaderboard();
            if (id === 'jurnal') muatJurnal();
        }

        // --- SCANNER LOGIC (VERSI ANTI-ERROR) ---
        async function startScan() {
            if (html5QrCode) {
                try { if(html5QrCode.getState() === 2) await html5QrCode.stop(); } catch(e){}
            }
            html5QrCode = new Html5Qrcode("reader");
            const config = { fps: 20, qrbox: 250 };
            
            html5QrCode.start({ facingMode: "environment" }, config, (txt) => {
                if(isProcessing) return; // Mencegah scan ganda cepat
                isProcessing = true;

                db.ref('kantin_users/' + txt).once('value', s => {
                    if(s.exists()){
                        const d = s.val();
                        // Format Tanggal DD-MM-YYYY
                        const skrg = new Date();
                        const tgl = ("0" + skrg.getDate()).slice(-2) + "-" + ("0" + (skrg.getMonth() + 1)).slice(-2) + "-" + skrg.getFullYear();
                        
                        db.ref(`presensi_siswa/${tgl}/${txt}`).set({
                            nama: d.nama,
                            kelas: d.kelas,
                            status: "HADIR",
                            jam: skrg.getHours() + ":" + ("0" + skrg.getMinutes()).slice(-2)
                        }).then(() => {
                            showNotif(d.nama + " HADIR!");
                            document.getElementById('lastScanName').innerText = "✅ " + d.nama;
                            setTimeout(() => { isProcessing = false; }, 2000);
                        });
                    } else {
                        document.getElementById('lastScanName').innerText = "❌ ID TIDAK TERDAFTAR";
                        setTimeout(() => { isProcessing = false; }, 2000);
                    }
                });
            }).catch(err => console.error("Kamera Error:", err));
        }

        // --- REKAP HARIAN (AUTO UPDATE) ---
        function muatRekapHarian() {
            let tglInput = document.getElementById('filterTgl').value;
            let tgl = tglInput ? tglInput.split("-").reverse().join("-") : 
                      ("0" + new Date().getDate()).slice(-2) + "-" + ("0" + (new Date().getMonth() + 1)).slice(-2) + "-" + new Date().getFullYear();

            db.ref('kantin_users').once('value', s1 => {
                db.ref(`presensi_siswa/${tgl}`).on('value', s2 => {
                    const dataA = s2.val() || {};
                    const body = document.getElementById('bodyRekap');
                    body.innerHTML = "";
                    s1.forEach(sis => {
                        const d = sis.val();
                        if(d.kelas === infoGuru.jabatan) {
                            const p = dataA[d.id] || { status: "ALFA" };
                            let clr = p.status === 'HADIR' ? 'bg-emerald-100 text-emerald-600' : 'bg-rose-100 text-rose-600';
                            body.innerHTML += `<tr>
                                <td class="px-8 py-4 font-black uppercase text-[10px]">${d.nama}</td>
                                <td class="px-8 py-4 text-center"><span class="px-3 py-1 rounded-full text-[8px] font-black ${clr}">${p.status}</span></td>
                                <td class="px-8 py-4 text-right">
                                    <button onclick="upStat('${tgl}','${d.id}','${d.nama}','HADIR')" class="w-6 h-6 bg-emerald-500 text-white rounded text-[8px]">H</button>
                                    <button onclick="upStat('${tgl}','${d.id}','${d.nama}','IZIN')" class="w-6 h-6 bg-blue-500 text-white rounded text-[8px]">I</button>
                                </td>
                            </tr>`;
                        }
                    });
                });
            });
        }

        function upStat(tgl, id, nama, stat) {
            db.ref(`presensi_siswa/${tgl}/${id}`).update({ nama, status: stat, jam: "Manual" });
        }

        function showNotif(msg) {
            const n = document.getElementById('notifScan');
            document.getElementById('msgNotif').innerText = msg;
            n.style.opacity = "1";
            setTimeout(() => n.style.opacity = "0", 2000);
        }

        // --- FITUR LAIN ---
        function simpanJurnal() {
            const teks = document.getElementById('isiJurnal').value;
            if(!teks) return;
            const tgl = ("0" + new Date().getDate()).slice(-2) + "-" + ("0" + (new Date().getMonth() + 1)).slice(-2) + "-" + new Date().getFullYear();
            db.ref(`jurnal_guru/${infoGuru.jabatan}/${tgl}`).set({ tanggal: tgl, isi: teks, guru: infoGuru.nama }).then(() => {
                document.getElementById('isiJurnal').value = "";
                muatJurnal();
            });
        }

        function muatJurnal() {
            db.ref(`jurnal_guru/${infoGuru.jabatan}`).limitToLast(5).once('value', s => {
                const list = document.getElementById('listJurnal');
                list.innerHTML = "";
                s.forEach(jx => {
                    const j = jx.val();
                    list.innerHTML = `<div class="bg-white p-6 rounded-[2rem] shadow-sm border-r-8 border-rose-200">
                        <p class="text-[8px] font-black text-slate-400 mb-1">${j.tanggal}</p>
                        <p class="text-[11px] font-bold text-slate-600 uppercase">${j.isi}</p>
                    </div>` + list.innerHTML;
                });
            });
        }

        function muatLeaderboard() {
            const container = document.getElementById('listLeaderboard');
            db.ref('kantin_users').once('value', sSiswa => {
                db.ref('presensi_siswa').once('value', sAbsen => {
                    const allA = sAbsen.val() || {};
                    let list = [];
                    sSiswa.forEach(sis => {
                        const d = sis.val();
                        if(d.kelas === infoGuru.jabatan) {
                            let jml = 0;
                            Object.keys(allA).forEach(tgl => {
                                if(allA[tgl][d.id] && allA[tgl][d.id].status === "HADIR") jml++;
                            });
                            list.push({ nama: d.nama, skor: jml });
                        }
                    });
                    list.sort((a,b) => b.skor - a.skor);
                    container.innerHTML = list.slice(0,5).map((S,i) => `<div class="bg-white p-5 rounded-3xl flex justify-between items-center shadow-sm">
                        <div class="flex items-center gap-4"><span class="text-xl">${i==0?'🥇':'👤'}</span><p class="font-black text-xs uppercase">${S.nama}</p></div>
                        <p class="font-black text-indigo-600 text-xs">${S.skor} Hari</p>
                    </div>`).join('');
                });
            });
        }
    </script>
</body>
</html>
