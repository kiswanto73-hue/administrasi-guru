<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-GURU PRO V3 | FULL SYSTEM</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .page { display: none; }
        .page.active { display: block; animation: fadeIn 0.3s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        #loginPage.hidden { display: none !important; }
        .rekap-scroll { overflow-x: auto; max-width: 100%; }
        .cell-status { min-width: 35px; text-align: center; font-size: 10px; border: 1px solid #f1f5f9; padding: 4px; }
        .status-H { background: #dcfce7; color: #166534; font-weight: 900; }
        .status-I { background: #dbeafe; color: #1e40af; }
        .status-S { background: #fef9c3; color: #854d0e; }
        .status-A { background: #fee2e2; color: #991b1b; }
    </style>
</head>
<body class="bg-slate-50 font-sans text-slate-700">

    <div id="notifScan" class="fixed top-10 left-1/2 z-[100] -translate-x-1/2 bg-emerald-600 text-white px-10 py-4 rounded-2xl font-black shadow-2xl uppercase opacity-0 pointer-events-none transition-all">
        <i class="fas fa-check-circle mr-2"></i> <span id="msgNotif">Berhasil!</span>
    </div>

    <section id="loginPage" class="fixed inset-0 z-[90] bg-indigo-950 flex items-center justify-center p-6">
        <div class="bg-white p-10 rounded-[3rem] shadow-2xl w-full max-w-md text-center border-b-8 border-yellow-400">
            <div class="bg-indigo-600 w-20 h-20 rounded-3xl flex items-center justify-center mx-auto mb-6 text-white shadow-xl rotate-3"><i class="fas fa-chalkboard-teacher text-3xl"></i></div>
            <h2 class="text-2xl font-black uppercase italic text-indigo-950">Login Guru</h2>
            <input type="text" id="idGuruLogin" placeholder="ID GURU" class="w-full p-5 bg-slate-100 rounded-2xl mb-4 text-center font-black outline-none border-2 border-transparent focus:border-indigo-500 shadow-inner">
            <button onclick="prosesLogin()" class="w-full bg-indigo-600 text-white p-5 rounded-2xl font-black uppercase shadow-lg">Masuk</button>
        </div>
    </section>

    <aside id="sidebar" class="fixed left-0 top-0 h-screen w-64 bg-indigo-950 text-white p-6 hidden lg:block z-50">
        <div class="flex items-center gap-3 mb-10 p-2 text-yellow-400">
            <i class="fas fa-university text-2xl"></i>
            <h1 class="font-black text-xl italic uppercase leading-none text-white">E-Guru</h1>
        </div>
        <nav class="space-y-2">
            <button onclick="showPage('dashboard')" class="w-full flex items-center gap-4 hover:bg-white/10 p-4 rounded-2xl font-bold text-xs transition-all"><i class="fas fa-th-large w-5 text-indigo-400"></i> Dashboard</button>
            <button onclick="showPage('presensi')" class="w-full flex items-center gap-4 hover:bg-white/10 p-4 rounded-2xl font-bold text-xs transition-all"><i class="fas fa-qrcode w-5 text-emerald-400"></i> Scan Presensi</button>
            <button onclick="showPage('rekap')" class="w-full flex items-center gap-4 hover:bg-white/10 p-4 rounded-2xl font-bold text-xs transition-all"><i class="fas fa-calendar-alt w-5 text-blue-400"></i> Rekap Absensi</button>
            
            <div class="pt-4 pb-2 px-4 text-[9px] font-black text-slate-500 uppercase tracking-widest">Akademik</div>
            <button onclick="showPage('jurnal')" class="w-full flex items-center gap-4 hover:bg-white/10 p-4 rounded-2xl font-bold text-xs transition-all"><i class="fas fa-book w-5 text-rose-400"></i> Jurnal Guru</button>
            <button onclick="showPage('leaderboard')" class="w-full flex items-center gap-4 hover:bg-white/10 p-4 rounded-2xl font-bold text-xs transition-all"><i class="fas fa-trophy w-5 text-yellow-400"></i> Leaderboard</button>
            
            <div class="pt-4 pb-2 px-4 text-[9px] font-black text-slate-500 uppercase tracking-widest">Eksternal</div>
            <a href="https://kiswanto73-hue.github.io/Bintang_Sekolah/" target="_blank" class="w-full flex items-center gap-4 hover:bg-white/10 p-4 rounded-2xl font-bold text-xs transition-all">
                <i class="fas fa-star w-5 text-yellow-300"></i> Bintang Sekolah
            </a>

            <button onclick="location.reload()" class="w-full flex items-center gap-4 text-rose-400 p-4 font-bold text-xs mt-8 hover:bg-rose-500/10 rounded-2xl transition-all"><i class="fas fa-sign-out-alt w-5"></i> Keluar</button>
        </nav>
    </aside>

    <main id="mainApp" class="lg:ml-64 p-4 md:p-8 hidden">
        <section id="dashboard" class="page active">
            <h2 id="welcomeName" class="text-3xl font-black text-slate-800 italic uppercase mb-2">Halo, Guru!</h2>
            <p id="kelasAmpu" class="text-xs font-bold text-indigo-600 uppercase mb-8"></p>
            <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                <div onclick="showPage('presensi')" class="bg-indigo-600 p-6 rounded-[2.5rem] text-white shadow-lg cursor-pointer">
                    <i class="fas fa-fingerprint text-2xl mb-4"></i>
                    <p class="font-black uppercase italic text-sm">Scan Presensi</p>
                </div>
                <div onclick="showPage('leaderboard')" class="bg-yellow-500 p-6 rounded-[2.5rem] text-white shadow-lg cursor-pointer">
                    <i class="fas fa-award text-2xl mb-4"></i>
                    <p class="font-black uppercase italic text-sm">Top Siswa</p>
                </div>
                <a href="https://kiswanto73-hue.github.io/Bintang_Sekolah/" target="_blank" class="bg-emerald-500 p-6 rounded-[2.5rem] text-white shadow-lg cursor-pointer flex flex-col">
                    <i class="fas fa-external-link-alt text-2xl mb-4"></i>
                    <p class="font-black uppercase italic text-sm">Bintang Sekolah</p>
                </a>
            </div>
        </section>

        <section id="jurnal" class="page">
            <div class="bg-white p-8 rounded-[3rem] shadow-sm mb-6 border-l-[12px] border-rose-500">
                <h2 class="font-black uppercase italic text-xl">Jurnal Harian</h2>
                <p class="text-[10px] font-bold text-slate-400 uppercase">Catatan Kegiatan Belajar Mengajar</p>
            </div>
            <div class="bg-white p-8 rounded-[3rem] shadow-sm mb-6">
                <textarea id="isiJurnal" class="w-full p-6 bg-slate-50 rounded-3xl outline-none border-2 border-transparent focus:border-rose-400 font-bold text-sm mb-4" rows="4" placeholder="Tulis kegiatan hari ini..."></textarea>
                <button onclick="simpanJurnal()" class="bg-rose-500 text-white px-8 py-4 rounded-2xl font-black uppercase text-[10px] shadow-lg">Simpan Catatan</button>
            </div>
            <div id="listJurnal" class="space-y-4"></div>
        </section>

        <section id="rekap" class="page">
            <div class="bg-white p-8 rounded-[3rem] shadow-sm mb-6 border-l-[12px] border-blue-500 flex justify-between items-center">
                <div>
                    <h2 class="font-black uppercase italic text-xl">Laporan Absensi</h2>
                    <p id="labelKelas" class="text-[10px] font-bold text-slate-400 uppercase italic"></p>
                </div>
                <div class="flex gap-2">
                    <input type="date" id="filterTgl" onchange="muatRekapHarian()" class="p-3 bg-slate-100 rounded-xl text-xs font-black outline-none">
                    <button onclick="exportExcel()" class="bg-slate-900 text-white px-6 py-3 rounded-xl text-[10px] font-black uppercase">Excel</button>
                </div>
            </div>
            <div class="flex gap-2 mb-4">
                <button onclick="toggleRekap('harian')" id="btnHarian" class="bg-indigo-600 text-white px-6 py-2 rounded-full font-black text-[10px] uppercase shadow-lg">Harian</button>
                <button onclick="toggleRekap('bulanan')" id="btnBulanan" class="bg-slate-200 text-slate-500 px-6 py-2 rounded-full font-black text-[10px] uppercase">Bulanan (Matrix)</button>
            </div>
            <div id="viewHarian" class="bg-white rounded-[3rem] overflow-hidden shadow-sm p-4">
                <table class="w-full text-left" id="tabelRekap">
                    <thead class="bg-slate-50 text-[10px] font-black text-slate-400 uppercase">
                        <tr><th class="px-8 py-5">Nama Siswa</th><th class="px-8 py-5 text-center">Status</th><th class="px-8 py-5 text-right">Aksi</th></tr>
                    </thead>
                    <tbody id="bodyRekap" class="divide-y divide-slate-50 font-bold uppercase italic text-slate-600"></tbody>
                </table>
            </div>
            <div id="viewBulanan" class="hidden bg-white rounded-[3rem] shadow-sm p-8">
                <div class="flex gap-4 mb-6">
                    <select id="blnRekap" class="p-3 bg-slate-100 rounded-xl text-xs font-black">
                        <option value="01">Januari</option><option value="02">Februari</option><option value="03">Maret</option>
                        <option value="04">April</option><option value="05">Mei</option><option value="06">Juni</option>
                        <option value="07">Juli</option><option value="08">Agustus</option><option value="09">September</option>
                        <option value="10">Oktober</option><option value="11">November</option><option value="12">Desember</option>
                    </select>
                    <button onclick="muatRekapBulanan()" class="bg-indigo-600 text-white px-6 py-3 rounded-xl text-[10px] font-black uppercase">Tampilkan Tabel</button>
                </div>
                <div class="rekap-scroll">
                    <table class="w-full border-collapse" id="tabelBulanan">
                        <thead id="headBulanan" class="bg-slate-100 font-black text-[9px] uppercase"></thead>
                        <tbody id="bodyBulanan" class="text-[10px] font-bold uppercase"></tbody>
                    </table>
                </div>
            </div>
        </section>

        <section id="leaderboard" class="page">
            <div class="bg-white p-8 rounded-[3rem] shadow-sm mb-6 border-l-[12px] border-yellow-400">
                <h2 class="font-black uppercase italic text-xl">🏆 Top Siswa Terajin</h2>
                <p id="labelKelasLeader" class="text-[10px] font-bold text-slate-400 uppercase italic"></p>
            </div>
            <div class="grid grid-cols-1 gap-3" id="listLeaderboard"></div>
        </section>

        <section id="presensi" class="page">
            <div class="max-w-md mx-auto text-center bg-white p-8 rounded-[3rem] shadow-2xl border-t-8 border-indigo-600">
                <h2 class="font-black italic uppercase mb-6">Scanner Presensi</h2>
                <div id="reader" class="rounded-[2.5rem] overflow-hidden bg-slate-50 aspect-square mb-6 border-4 border-slate-100"></div>
                <div id="lastScanName" class="text-lg font-black text-indigo-600 uppercase italic italic">Siap Scan...</div>
            </div>
        </section>
    </main>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCUjE8WXa8Py4vnojrXDUR3uCvnQEzP6zQ",
            databaseURL: "https://e-kantin-91f0c-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "e-kantin-91f0c",
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        let infoGuru = null;
        let html5QrCode;

        document.getElementById('filterTgl').valueAsDate = new Date();

        function prosesLogin() {
            const id = document.getElementById('idGuruLogin').value.trim();
            db.ref('kantin_users/' + id).once('value', s => {
                if(s.exists() && s.val().kelas === "GURU"){
                    infoGuru = s.val();
                    document.getElementById('loginPage').classList.add('hidden');
                    document.getElementById('mainApp').classList.remove('hidden');
                    document.getElementById('welcomeName').innerText = "Halo, " + infoGuru.nama;
                    document.getElementById('kelasAmpu').innerText = "Wali Kelas: " + infoGuru.jabatan;
                    document.getElementById('labelKelas').innerText = "Data Kelas: " + infoGuru.jabatan;
                    document.getElementById('labelKelasLeader').innerText = "Hanya Kelas " + infoGuru.jabatan;
                    showPage('dashboard');
                } else { alert("ID Guru Tidak Valid!"); }
            });
        }

        function showPage(id) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            if (id === 'presensi') startScan(); else if(html5QrCode) html5QrCode.stop();
            if (id === 'rekap') muatRekapHarian();
            if (id === 'leaderboard') muatLeaderboard();
            if (id === 'jurnal') muatJurnal();
        }

        function muatLeaderboard() {
            const container = document.getElementById('listLeaderboard');
            const target = infoGuru.jabatan;
            db.ref('kantin_users').once('value', sSiswa => {
                db.ref('presensi_siswa').once('value', sAbsen => {
                    const allA = sAbsen.val() || {};
                    let list = [];
                    sSiswa.forEach(sis => {
                        const d = sis.val();
                        if(d.kelas === target) {
                            let jml = 0;
                            Object.keys(allA).forEach(tgl => {
                                if(allA[tgl][d.id] && allA[tgl][d.id].status === "HADIR") jml++;
                            });
                            list.push({ nama: d.nama, skor: jml });
                        }
                    });
                    list.sort((a,b) => b.skor - a.skor);
                    container.innerHTML = list.slice(0,10).map((S,i) => `
                        <div class="bg-white p-5 rounded-3xl flex justify-between items-center shadow-sm border-2 ${i<3?'border-yellow-200':'border-transparent'}">
                            <div class="flex items-center gap-4">
                                <span class="text-xl">${i==0?'🥇':i==1?'🥈':i==2?'🥉':'👤'}</span>
                                <p class="font-black text-xs uppercase">${S.nama}</p>
                            </div>
                            <p class="font-black text-indigo-600">${S.skor} Hari</p>
                        </div>
                    `).join('');
                });
            });
        }

        function simpanJurnal() {
            const teks = document.getElementById('isiJurnal').value;
            if(!teks) return;
            const tgl = new Date().toLocaleDateString('id-ID').replace(/\//g, '-');
            db.ref(`jurnal_guru/${infoGuru.jabatan}/${tgl}`).set({
                tanggal: tgl, isi: teks, guru: infoGuru.nama
            }).then(() => { 
                document.getElementById('isiJurnal').value = "";
                muatJurnal();
                showNotif("Jurnal Disimpan");
            });
        }

        function muatJurnal() {
            db.ref(`jurnal_guru/${infoGuru.jabatan}`).limitToLast(10).once('value', s => {
                const list = document.getElementById('listJurnal');
                list.innerHTML = "";
                s.forEach(jx => {
                    const j = jx.val();
                    list.innerHTML = `
                        <div class="bg-white p-6 rounded-[2rem] shadow-sm border-r-8 border-rose-200">
                            <p class="text-[9px] font-black text-slate-400 mb-2">${j.tanggal}</p>
                            <p class="text-xs font-bold text-slate-600 uppercase">${j.isi}</p>
                        </div>
                    ` + list.innerHTML;
                });
            });
        }

        function muatRekapHarian() {
            const tgl = document.getElementById('filterTgl').value.split("-").reverse().join("-");
            const target = infoGuru.jabatan;
            db.ref('kantin_users').once('value', s1 => {
                db.ref(`presensi_siswa/${tgl}`).on('value', s2 => {
                    const dataA = s2.val() || {};
                    const body = document.getElementById('bodyRekap');
                    body.innerHTML = "";
                    s1.forEach(sis => {
                        const d = sis.val();
                        if(d.kelas === target) {
                            const p = dataA[d.id] || { status: "ALFA" };
                            let clr = p.status === 'HADIR' ? 'bg-emerald-100 text-emerald-600' : p.status === 'IZIN' ? 'bg-blue-100 text-blue-600' : p.status === 'SAKIT' ? 'bg-yellow-100 text-yellow-600' : 'bg-rose-100 text-rose-600';
                            body.innerHTML += `<tr>
                                <td class="px-8 py-4 font-black text-xs uppercase">${d.nama}</td>
                                <td class="px-8 py-4 text-center"><span class="px-4 py-1.5 rounded-full text-[9px] font-black ${clr}">${p.status}</span></td>
                                <td class="px-8 py-4 text-right">
                                    <div class="flex gap-1 justify-end">
                                        <button onclick="upStat('${tgl}','${d.id}','${d.nama}','HADIR')" class="w-7 h-7 bg-emerald-500 text-white rounded-lg text-[9px]">H</button>
                                        <button onclick="upStat('${tgl}','${d.id}','${d.nama}','IZIN')" class="w-7 h-7 bg-blue-500 text-white rounded-lg text-[9px]">I</button>
                                        <button onclick="upStat('${tgl}','${d.id}','${d.nama}','SAKIT')" class="w-7 h-7 bg-yellow-500 text-white rounded-lg text-[9px]">S</button>
                                    </div>
                                </td>
                            </tr>`;
                        }
                    });
                });
            });
        }

        function muatRekapBulanan() {
            const bln = document.getElementById('blnRekap').value;
            const thn = new Date().getFullYear();
            const jml = new Date(thn, bln, 0).getDate();
            const target = infoGuru.jabatan;
            const head = document.getElementById('headBulanan');
            const body = document.getElementById('bodyBulanan');
            
            let hRow = `<tr><th class="p-3 border sticky left-0 bg-slate-100 z-10">Siswa</th>`;
            for(let i=1; i<=jml; i++) hRow += `<th class="cell-status border bg-slate-50">${i}</th>`;
            head.innerHTML = hRow + `</tr>`;

            db.ref('kantin_users').once('value', sSiswa => {
                db.ref('presensi_siswa').once('value', sAbsen => {
                    const allData = sAbsen.val() || {};
                    body.innerHTML = "";
                    sSiswa.forEach(sis => {
                        const d = sis.val();
                        if(d.kelas === target) {
                            let bRow = `<tr><td class="p-3 border font-black text-[9px] sticky left-0 bg-white z-10 uppercase">${d.nama}</td>`;
                            for(let i=1; i<=jml; i++) {
                                const tK = `${String(i).padStart(2,'0')}-${bln}-${thn}`;
                                const st = (allData[tK] && allData[tK][d.id]) ? allData[tK][d.id].status.charAt(0) : 'A';
                                bRow += `<td class="cell-status border status-${st}">${st}</td>`;
                            }
                            body.innerHTML += bRow + `</tr>`;
                        }
                    });
                });
            });
        }

        function upStat(tgl, id, nama, stat) {
            db.ref(`presensi_siswa/${tgl}/${id}`).set({ nama, kelas: infoGuru.jabatan, status: stat, jam: "Manual" });
        }

        function startScan() {
            html5QrCode = new Html5Qrcode("reader");
            html5QrCode.start({ facingMode: "environment" }, { fps: 20, qrbox: 250 }, (txt) => {
                db.ref('kantin_users/' + txt).once('value', s => {
                    if(s.exists() && s.val().kelas === infoGuru.jabatan){
                        const t = new Date().toLocaleDateString('id-ID').replace(/\//g, '-');
                        db.ref(`presensi_siswa/${t}/${txt}`).set({
                            nama: s.val().nama, kelas: s.val().kelas, status: "HADIR", jam: new Date().toLocaleTimeString('id-ID')
                        }).then(() => { showNotif(s.val().nama + " Hadir!"); });
                    } else { alert("Bukan Siswa Kelas Ini!"); }
                });
            });
        }

        function toggleRekap(type) {
            document.getElementById('viewHarian').classList.toggle('hidden', type === 'bulanan');
            document.getElementById('viewBulanan').classList.toggle('hidden', type === 'harian');
            document.getElementById('btnHarian').className = type === 'harian' ? "bg-indigo-600 text-white px-6 py-2 rounded-full font-black text-[10px] shadow-lg" : "bg-slate-200 text-slate-500 px-6 py-2 rounded-full font-black text-[10px]";
            document.getElementById('btnBulanan').className = type === 'bulanan' ? "bg-emerald-600 text-white px-6 py-2 rounded-full font-black text-[10px] shadow-lg" : "bg-slate-200 text-slate-500 px-6 py-2 rounded-full font-black text-[10px]";
        }

        function showNotif(msg) {
            const n = document.getElementById('notifScan');
            document.getElementById('msgNotif').innerText = msg;
            n.style.opacity = "1";
            setTimeout(() => n.style.opacity = "0", 2000);
        }

        function exportExcel() {
            const table = document.getElementById('viewBulanan').classList.contains('hidden') ? 'tabelRekap' : 'tabelBulanan';
            XLSX.writeFile(XLSX.utils.table_to_book(document.getElementById(table)), `Laporan_${infoGuru.jabatan}.xlsx`);
        }
    </script>
</body>
</html>
