<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-GURU PRO | SDN 165 TJB</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .page { display: none; }
        .page.active { display: block; animation: fadeIn 0.3s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        #loginPage { display: flex; }
    </style>
</head>
<body class="bg-slate-100 font-sans text-slate-700">

    <section id="loginPage" class="fixed inset-0 z-[100] bg-indigo-950 flex items-center justify-center p-6">
        <div class="bg-white p-8 rounded-[3rem] shadow-2xl w-full max-w-md text-center">
            <div class="bg-yellow-400 w-16 h-16 rounded-2xl flex items-center justify-center mx-auto mb-6 text-indigo-950 shadow-lg">
                <i class="fas fa-lock text-2xl"></i>
            </div>
            <h2 class="text-2xl font-black italic uppercase text-slate-800">Login Guru</h2>
            <p class="text-xs font-bold text-slate-400 mb-8">SDN 165 TANJUNG JABUNG BARAT</p>
            
            <input type="password" id="idGuruLogin" placeholder="Masukkan ID Guru / NIP" class="w-full p-4 bg-slate-100 border-none rounded-2xl mb-4 text-center font-black outline-none focus:ring-2 ring-indigo-500">
            <button onclick="prosesLogin()" class="w-full bg-indigo-600 text-white p-4 rounded-2xl font-black uppercase shadow-lg hover:bg-indigo-700 transition-all">Masuk Ke Sistem</button>
        </div>
    </section>

    <aside id="sidebar" class="fixed left-0 top-0 h-screen w-64 bg-indigo-950 text-white p-6 hidden lg:hidden shadow-2xl z-50">
        <div class="flex items-center gap-3 mb-10">
            <div class="bg-yellow-400 p-2 rounded-xl text-indigo-900"><i class="fas fa-user-graduate"></i></div>
            <h1 class="font-black text-xl italic leading-none">E-GURU</h1>
        </div>
        <nav class="space-y-1 text-xs font-bold">
            <button onclick="showPage('dashboard')" class="w-full flex items-center gap-3 p-4 rounded-2xl hover:bg-white/10"><i class="fas fa-home"></i> Dashboard</button>
            <button onclick="showPage('presensi')" class="w-full flex items-center gap-3 p-4 rounded-2xl hover:bg-white/10"><i class="fas fa-fingerprint"></i> Presensi Scan</button>
            <button onclick="showPage('rekap')" class="w-full flex items-center gap-3 p-4 rounded-2xl hover:bg-white/10"><i class="fas fa-table"></i> Rekap Absensi</button>
            <button onclick="showPage('nilai')" class="w-full flex items-center gap-3 p-4 rounded-2xl hover:bg-white/10"><i class="fas fa-edit"></i> Input Nilai</button>
            <button onclick="logout()" class="w-full flex items-center gap-3 p-4 rounded-2xl text-red-400 mt-10"><i class="fas fa-sign-out-alt"></i> Keluar</button>
        </nav>
    </aside>

    <main id="mainApp" class="p-4 md:p-8 hidden">
        <section id="rekap" class="page">
            <div class="bg-white p-6 rounded-[2.5rem] mb-6 flex justify-between items-center shadow-sm">
                <h2 class="font-black uppercase italic text-slate-800">Rekap Absensi</h2>
                <div class="flex gap-2">
                    <select id="filterKelasRekap" onchange="muatRekap()" class="p-2 bg-slate-100 rounded-xl text-[10px] font-bold border-none outline-none">
                        <option value="SEMUA">Semua Kelas</option>
                        <option value="KELAS 1">Kelas 1</option>
                        <option value="KELAS 2">Kelas 2</option>
                        <option value="KELAS 3">Kelas 3</option>
                        <option value="KELAS 4">Kelas 4</option>
                        <option value="KELAS 5">Kelas 5</option>
                        <option value="KELAS 6">Kelas 6</option>
                    </select>
                </div>
            </div>
            <div class="bg-white rounded-[2.5rem] overflow-hidden shadow-sm">
                <table class="w-full text-left">
                    <thead class="bg-slate-50 text-[10px] font-black text-slate-400 uppercase">
                        <tr><th class="p-6">Nama</th><th class="p-6">Kelas</th><th class="p-6 text-center">Status</th></tr>
                    </thead>
                    <tbody id="bodyRekap" class="text-xs font-bold divide-y divide-slate-50 uppercase italic"></tbody>
                </table>
            </div>
        </section>

        <section id="nilai" class="page">
            <div class="bg-white p-8 rounded-[3rem] shadow-sm mb-6 border-b-4 border-emerald-500">
                <div class="flex justify-between items-center mb-6">
                    <h2 class="text-xl font-black italic uppercase text-slate-800">Input Nilai Siswa</h2>
                    <button onclick="tambahMapel()" class="bg-indigo-100 text-indigo-600 px-4 py-2 rounded-xl text-[10px] font-black uppercase">+ Mapel</button>
                </div>
                <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                    <select id="klsNilai" onchange="loadSiswaNilai()" class="p-4 bg-slate-50 rounded-2xl text-xs font-bold outline-none ring-1 ring-slate-100">
                        </select>
                    <select id="mapelNilai" class="p-4 bg-slate-50 rounded-2xl text-xs font-bold outline-none ring-1 ring-slate-100">
                        <option value="MATEMATIKA">MATEMATIKA</option>
                        <option value="B. INDONESIA">B. INDONESIA</option>
                    </select>
                    <button onclick="simpanNilaiSemua()" class="bg-emerald-600 text-white p-4 rounded-2xl text-xs font-black uppercase">Simpan Semua</button>
                </div>
            </div>
            <div class="bg-white rounded-[3rem] shadow-sm overflow-hidden"><table class="w-full text-left"><tbody id="bodyNilai"></tbody></table></div>
        </section>
    </main>

    <script>
        // CONFIG FIREBASE (Tetap)
        const firebaseConfig = { /* ... config bapak ... */ };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let infoGuru = null;

        // --- LOGIKA LOGIN ---
        function prosesLogin() {
            const id = document.getElementById('idGuruLogin').value;
            db.ref('kantin_users/' + id).once('value', s => {
                if(s.exists() && s.val().kelas === "GURU") {
                    infoGuru = s.val();
                    document.getElementById('loginPage').style.display = 'none';
                    document.getElementById('mainApp').classList.remove('hidden');
                    document.getElementById('sidebar').classList.remove('hidden', 'lg:hidden');
                    document.getElementById('sidebar').classList.add('lg:block');
                    
                    // Dashboard Personalization
                    alert("Selamat Datang, " + infoGuru.nama);
                    setDropdownKelas();
                    showPage('dashboard');
                } else {
                    alert("ID Guru tidak terdaftar!");
                }
            });
        }

        function setDropdownKelas() {
            const select = document.getElementById('klsNilai');
            // Jika guru punya kelas spesifik, kunci ke kelas itu. 
            // Jika kelasnya "GURU" (admin), kasih semua pilihan.
            const kelasList = ["KELAS 1", "KELAS 2", "KELAS 3", "KELAS 4", "KELAS 5", "KELAS 6"];
            select.innerHTML = `<option value="">-- Pilih Kelas --</option>`;
            kelasList.forEach(k => {
                select.innerHTML += `<option value="${k}">${k}</option>`;
            });
        }

        // --- TAMBAH MAPEL ---
        function tambahMapel() {
            const baru = prompt("Masukkan Nama Mata Pelajaran Baru:");
            if(baru) {
                const opt = document.createElement("option");
                opt.value = baru.toUpperCase();
                opt.text = baru.toUpperCase();
                document.getElementById('mapelNilai').add(opt);
                alert("Mapel " + baru + " berhasil ditambahkan ke sesi ini!");
            }
        }

        // --- FUNGSI REKAP DENGAN FILTER ---
        function muatRekap() {
            const klsPilihan = document.getElementById('filterKelasRekap').value;
            const tgl = new Date().toLocaleDateString('id-ID').replace(/\//g, '-');
            
            db.ref('kantin_users').once('value', sSiswa => {
                db.ref(`presensi_siswa/${tgl}`).once('value', sAbsen => {
                    const absen = sAbsen.val() || {};
                    const body = document.getElementById('bodyRekap');
                    body.innerHTML = "";
                    
                    sSiswa.forEach(s => {
                        const d = s.val();
                        if(d.kelas !== "GURU") {
                            // Filter kelas
                            if(klsPilihan === "SEMUA" || d.kelas === klsPilihan) {
                                const hadir = !!absen[d.id];
                                body.innerHTML += `
                                <tr class="hover:bg-slate-50">
                                    <td class="p-6">${d.nama}</td>
                                    <td class="p-6 text-slate-400">${d.kelas}</td>
                                    <td class="p-6 text-center">
                                        <span class="px-3 py-1 rounded-full text-[9px] ${hadir ? 'bg-emerald-100 text-emerald-600' : 'bg-rose-100 text-rose-600'}">
                                            ${hadir ? 'HADIR' : 'ALFA'}
                                        </span>
                                    </td>
                                </tr>`;
                            }
                        }
                    });
                });
            });
        }

        function logout() { location.reload(); }

        // (Lanjutkan fungsi showPage, simpanNilai, dll seperti kode sebelumnya)
    </script>
</body>
</html>
