<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Presensi Scan QR | SDN 165 TJB</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-indigo-950 min-h-screen text-white font-sans">

    <div class="max-w-md mx-auto p-6">
        <div class="text-center mb-8">
            <h1 class="text-2xl font-black italic">PRESENSI DIGITAL</h1>
            <p class="text-xs text-indigo-300 font-bold uppercase tracking-widest">SDN 165 Tanjung Jabung Barat</p>
        </div>

        <div class="bg-white rounded-[2.5rem] p-4 shadow-2xl overflow-hidden relative">
            <div id="reader" class="w-full h-64 bg-black rounded-3xl overflow-hidden"></div>
            <div class="absolute inset-0 pointer-events-none border-[12px] border-white rounded-[2.5rem]"></div>
        </div>

        <div id="resultArea" class="mt-6 hidden animate-bounce">
            <div class="bg-emerald-500 p-4 rounded-2xl text-center">
                <p class="text-[10px] font-bold opacity-80 uppercase">Siswa Terdeteksi:</p>
                <h2 id="namaTerdeteksi" class="text-xl font-black uppercase">---</h2>
                <p id="kelasTerdeteksi" class="text-xs font-bold"></p>
            </div>
        </div>

        <div class="mt-8">
            <h3 class="text-sm font-black mb-4 flex justify-between uppercase">
                <span>Kehadiran Hari Ini</span>
                <span id="counterHadir" class="bg-yellow-400 text-indigo-900 px-3 py-0.5 rounded-full text-[10px]">0</span>
            </h3>
            <div id="logPresensi" class="space-y-2 max-h-60 overflow-y-auto">
                </div>
        </div>
    </div>

    <script>
        // CONFIG FIREBASE (Gunakan punya Bapak)
        const firebaseConfig = {
            apiKey: "AIzaSyCUjE8WXa8Py4vnojrXDUR3uCvnQEzP6zQ",
            databaseURL: "https://e-kantin-91f0c-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "e-kantin-91f0c",
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let isScanning = true;

        // Inisialisasi Scanner
        const html5QrCode = new Html5Qrcode("reader");
        const config = { fps: 10, qrbox: { width: 250, height: 250 } };

        html5QrCode.start({ facingMode: "environment" }, config, onScanSuccess);

        function onScanSuccess(decodedText) {
            if (!isScanning) return;
            isScanning = false; // Stop sementara agar tidak double scan

            // Ambil data siswa dari Firebase
            db.ref('kantin_users/' + decodedText).once('value').then(snap => {
                if (snap.exists()) {
                    const data = snap.val();
                    catatKehadiran(decodedText, data.nama, data.kelas);
                    tampilkanNotif(data.nama, data.kelas);
                    
                    // Suara bip (opsional)
                    const audio = new Audio('https://www.soundjay.com/buttons/beep-07a.mp3');
                    audio.play();
                } else {
                    alert("ID Kartu Tidak Terdaftar!");
                    isScanning = true;
                }
            });
        }

        function catatKehadiran(id, nama, kelas) {
            const tgl = new Date().toLocaleDateString('id-ID').replace(/\//g, '-');
            const waktu = new Date().toLocaleTimeString('id-ID');

            // Simpan ke node 'presensi_guru' agar terpisah dari kantin
            db.ref(`presensi_siswa/${tgl}/${id}`).set({
                nama: nama,
                kelas: kelas,
                jam: waktu,
                status: "HADIR"
            }).then(() => {
                setTimeout(() => { isScanning = true; }, 3000); // Scan lagi setelah 3 detik
            });
        }

        function tampilkanNotif(nama, kelas) {
            const area = document.getElementById('resultArea');
            document.getElementById('namaTerdeteksi').innerText = nama;
            document.getElementById('kelasTerdeteksi').innerText = kelas;
            area.classList.remove('hidden');
            setTimeout(() => { area.classList.add('hidden'); }, 3000);
        }

        // Tampilkan Log Realtime
        const tglHariIni = new Date().toLocaleDateString('id-ID').replace(/\//g, '-');
        db.ref(`presensi_siswa/${tglHariIni}`).on('value', snap => {
            const list = document.getElementById('logPresensi');
            const count = document.getElementById('counterHadir');
            list.innerHTML = "";
            let i = 0;
            
            snap.forEach(child => {
                const d = child.val();
                i++;
                list.innerHTML = `
                <div class="bg-white/10 p-3 rounded-2xl flex justify-between items-center border-l-4 border-yellow-400">
                    <div>
                        <p class="text-[10px] font-black uppercase leading-none">${d.nama}</p>
                        <p class="text-[8px] font-bold text-indigo-300 mt-1">${d.kelas}</p>
                    </div>
                    <div class="text-right">
                        <p class="text-[10px] font-black">${d.jam}</p>
                        <p class="text-[7px] text-emerald-400 font-bold">TERCATAT</p>
                    </div>
                </div>` + list.innerHTML;
            });
            count.innerText = i;
        });
    </script>
</body>
</html>
